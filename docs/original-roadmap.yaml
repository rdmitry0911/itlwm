      - verdict.approval_workflow_cleared_not_claimed
      - verdict.load_admission_not_claimed
      - verdict.loaded_uuid_after_reboot_not_claimed
      - verdict.join_trigger_not_claimed
      - verdict.pmk_delivery_not_claimed
