- id: itlwm-rm-05a0c0-auxkc-approval-load-admission-boundary
  title: Tahoe AuxKC approval and load-admission boundary
  goal_item_ids:
  - itlwm-fg-05a0c0-auxkc-approval-load-admission-boundary
  depends_on:
  - itlwm-rm-05a00-lab-ap-visibility-readiness
  description: >-
    Resolve the live Tahoe blocker proven by the previous blocked attempt: the
    selected-head AirportItlwm kext is installed on disk, but kmutil reports that
    the bundle is not approved to load and the live system keeps a stale approved
    UUID loaded after reboot. This step proves the approval/load-admission gate
    is resolved for the selected bundle without claiming the later loaded UUID
    after reboot, join-trigger/PMK, AUTH, association, DHCP, data transfer,
    reconnect, or final Wi-Fi equivalence gates.
  acceptance:
  - A live Tahoe guest run with passthrough Wi-Fi attached reaches the selected
    bundle approval/load-admission path from committed sources.
  - The evidence proves the prior blocker signature is resolved; kmutil no
    longer returns the System Settings approval-required error for the selected
    AirportItlwm bundle.
  - The artifact records the installed selected UUID and leaves selected
    loaded-after-reboot, join-trigger/PMK, AUTH, association, DHCP, and final
    Wi-Fi equivalence criteria unclaimed.
  requires:
  - id: itlwm-rm-05a0c0-auxkc-approval-load-admission-boundary
    artifact: evidence/runtime/tahoe_auxkc_approval_load_admission_boundary.json
    checks:
      require_fields:
      - selected_step
      - input_head
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.wifi_passthrough_attached
      - selected_kext.input_head
      - selected_kext.installed_uuid
      - approval_gate.prior_blocker_signature
      - approval_gate.system_settings_approval_required
      - approval_gate.kmutil_load_exit_code
      - approval_gate.kmutil_load_approval_error_observed
      - approval_gate.selected_bundle_admitted_for_load
      - verdict.ready_for_auxkc_boot_safe_load_retry
      - verdict.loaded_uuid_after_reboot_not_claimed
      - verdict.join_trigger_not_claimed
      - verdict.pmk_delivery_not_claimed
      - verdict.auth_tx_rx_not_claimed
      - verdict.final_wifi_equivalence_not_claimed
      min_number:
        capture_wallclock_seconds: 10
      equals:
        selected_step: step:itlwm-rm-05a0c0-auxkc-approval-load-admission-boundary
        runtime_environment.guest_wifi_interface: en1
        runtime_environment.wifi_passthrough_attached: true
        approval_gate.prior_blocker_signature: system_settings_approval_required_for_selected_airportitlwm
        approval_gate.system_settings_approval_required: false
        approval_gate.kmutil_load_approval_error_observed: false
        approval_gate.selected_bundle_admitted_for_load: true
        verdict.ready_for_auxkc_boot_safe_load_retry: true
        verdict.loaded_uuid_after_reboot_not_claimed: true
        verdict.join_trigger_not_claimed: true
        verdict.pmk_delivery_not_claimed: true
        verdict.auth_tx_rx_not_claimed: true
        verdict.final_wifi_equivalence_not_claimed: true
      forbid_values:
        approval_gate.source:
        - synthetic
        - replay
        - static_fixture

- id: itlwm-rm-05a0c-auxkc-boot-safe-load-boundary
  title: Tahoe selected AuxKC boot-safe load boundary
  goal_item_ids:
  - itlwm-fg-05a0c-auxkc-boot-safe-load-boundary
  depends_on:
  - itlwm-rm-05a0c0-auxkc-approval-load-admission-boundary
  description: >-
    Establish the narrower live-lab load boundary that the selected-head
    AirportItlwm kext can be rebuilt, installed into the Tahoe Auxiliary Kernel
    Collection after the approval/load-admission gate is proven resolved, loaded
    with the passthrough Wi-Fi adapter attached, and survive reboot back to guest
    SSH without kernel panic. This step does not claim join-trigger delivery,
    PMK helper delivery, AUTH TX/RX completion, AUTH response ACK, association,
    DHCP, data transfer, reconnect, or final Wi-Fi equivalence.
  acceptance:
  - A live Tahoe guest run installs the selected-head kext into AuxKC, reboots
    with passthrough Wi-Fi attached, and returns over SSH.
  - The loaded kext UUID/version is proven to match the selected input head or
    candidate commit under test.
  - The evidence records absence of kernel panic, remote-debugger wait, and
    stale/replayed boot logs for the selected attempt.
  - The artifact explicitly leaves join-trigger/PMK, AUTH, association, DHCP,
    and later Wi-Fi equivalence criteria unclaimed.
  requires:
  - id: itlwm-rm-05a0c-auxkc-boot-safe-load-boundary
    artifact: evidence/runtime/tahoe_auxkc_boot_safe_load_boundary.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.wifi_passthrough_attached
      - auxkc.selected_head_installed
      - auxkc.selected_head_uuid
      - driver.kext_loaded
      - driver.loaded_uuid_matches_selected_head
      - boot.guest_ssh_returned
      - boot.kernel_panic_observed
      - panic.waiting_for_remote_debugger_observed
      - candidate_fix.source_delta_committed
      - verdict.ready_for_join_trigger_pmk_retry
      - verdict.join_trigger_not_claimed
      - verdict.pmk_delivery_not_claimed
      - verdict.auth_tx_rx_not_claimed
      - verdict.final_wifi_equivalence_not_claimed
      min_number:
        capture_wallclock_seconds: 30
      equals:
        runtime_environment.guest_wifi_interface: en1
        runtime_environment.wifi_passthrough_attached: true
        auxkc.selected_head_installed: true
        driver.kext_loaded: true
        driver.loaded_uuid_matches_selected_head: true
        boot.guest_ssh_returned: true
        boot.kernel_panic_observed: false
        panic.waiting_for_remote_debugger_observed: false
        candidate_fix.source_delta_committed: true
        verdict.ready_for_join_trigger_pmk_retry: true
        verdict.join_trigger_not_claimed: true
        verdict.pmk_delivery_not_claimed: true
        verdict.auth_tx_rx_not_claimed: true
        verdict.final_wifi_equivalence_not_claimed: true
      forbid_values:
        boot.source:
        - synthetic
        - replay
        - static_fixture
        panic.source:
        - synthetic
        - replay
        - static_fixture

- id: itlwm-rm-05a0c-join-trigger-pmk-helper-delivery-boundary
  title: Tahoe join-trigger and PMK helper delivery boundary
  goal_item_ids:
  - itlwm-fg-05a0c-join-trigger-pmk-helper-delivery-boundary
  depends_on:
  - itlwm-rm-05a0c-auxkc-boot-safe-load-boundary
  description: >-
    Establish the narrower live-lab boundary that a guest join trigger reaches
    the driver/PLTI association-target path and the PMK helper publishes and
    delivers an external PMK for the allowed AP. This step does not claim AUTH
    TX completion, AUTH RX response-window publication, AUTH response ACK,
    association, DHCP, data transfer, reconnect, or final Wi-Fi equivalence.
  acceptance:
  - A live Tahoe guest run against an allowed operator-configured lab AP reaches
    the driver/PLTI join path and publishes a concrete association target.
  - The PMK helper daemon/keychain path is prepared and delivers the PMK for the
    same allowed AP without storing AP secrets in committed project files.
  - The artifact explicitly leaves AUTH TX/RX completion, AUTH response ACK, and
    later Wi-Fi equivalence criteria unclaimed.
  requires:
  - id: itlwm-rm-05a0c-join-trigger-pmk-helper-delivery-boundary
    artifact: evidence/runtime/tahoe_join_trigger_pmk_delivery_boundary.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.allowed_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - scan.allowed_ap_visible
      - join_trigger.driver_path_entered
      - join_trigger.interface_active_or_auth_attempt_started
      - plti.association_target_published
      - pmk_helper.daemon_running
      - pmk_helper.keychain_prepared
      - pmk_helper.pmk_delivered
      - candidate_fix.project_delta_committed
      - verdict.ready_for_auth_tx_rx_completion_retry
      - verdict.auth_tx_completion_not_claimed
      - verdict.auth_response_ack_not_claimed
      - verdict.final_wifi_equivalence_not_claimed
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        scan.allowed_ap_visible: true
        join_trigger.driver_path_entered: true
        join_trigger.interface_active_or_auth_attempt_started: true
        plti.association_target_published: true
        pmk_helper.daemon_running: true
        pmk_helper.keychain_prepared: true
        pmk_helper.pmk_delivered: true
        candidate_fix.project_delta_committed: true
        verdict.ready_for_auth_tx_rx_completion_retry: true
        verdict.auth_tx_completion_not_claimed: true
        verdict.auth_response_ack_not_claimed: true
        verdict.final_wifi_equivalence_not_claimed: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        join_trigger.source:
        - synthetic
        - replay
        - static_fixture
        pmk_helper.source:
        - synthetic
        - replay
        - static_fixture

