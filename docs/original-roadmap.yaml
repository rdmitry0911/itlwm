- id: itlwm-rm-05
  title: Tahoe scan/join/auth/roam/power runtime verification
  status: planned
  progress: 0
  depends_on:
  - itlwm-rm-05a-auth-join-readiness
  goal_item_ids:
  - itlwm-fg-05-runtime-wifi-equivalence
  acceptance_criteria:
  - advances linked final-goal item with runtime or deterministic evidence
  - Tahoe runtime scan/join/auth/DHCP/data/reconnect evidence is captured from a real
    guest Wi-Fi session against an allowed lab AP
  evidence: []
  requires:
  - id: itlwm-rm-05-runtime-wifi-equivalence
    artifact: evidence/runtime/tahoe_wifi_session.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.lab_ap_identifier
      - lab.ap_allowed
      - scan.aps_seen
      - association.authenticated
      - association.associated
      - dhcp_lease.acquired
      - data_transfer.rx_bytes
      - data_transfer.throughput_mbps
      - reconnects.success_count
      - ap_apsta_scope.status
      min_number:
        capture_wallclock_seconds: 60
        scan.aps_seen: 1
        data_transfer.rx_bytes: 1048576
        data_transfer.throughput_mbps: 0.1
        reconnects.success_count: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        lab.ap_allowed: true
        association.authenticated: true
        association.associated: true
        dhcp_lease.acquired: true
        data_transfer.lab_ap_path: true
        ap_apsta_scope.status: out_of_target_scope_or_verified
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        association.source:
        - synthetic
        - replay
        - static_fixture
        dhcp_lease.source:
        - synthetic
        - replay
        - static_fixture
        data_transfer.source:
        - synthetic
        - replay
        - loopback
        - static_fixture
