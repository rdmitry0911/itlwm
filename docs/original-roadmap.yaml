  - advances linked final-goal item with runtime or deterministic evidence
  - live Tahoe lab evidence proves the WCL association/auth path advances past the previous AUTH timeout/JOIN_ABORT rollback
  - the evidence is captured from the guest against an allowed lab AP, not from synthetic or replayed logs
  evidence: []
  requires:
  - id: itlwm-rm-05a-auth-join-readiness
    artifact: evidence/runtime/tahoe_auth_join_progress.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.lab_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association_target.published
      - auth.started
      - auth.timeout_observed
      - join_abort_observed
      - association.authenticated
      - association.associated
      - candidate_fix.source_delta_committed
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        association_target.published: true
        auth.started: true
        auth.timeout_observed: false
        join_abort_observed: false
        association.authenticated: true
        association.associated: true
        candidate_fix.source_delta_committed: true
