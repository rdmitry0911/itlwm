- id: itlwm-rm-05a0c0a0-auxkc-approval-authority-isolation-boundary
  title: Tahoe AuxKC approval authority isolation boundary
  goal_item_ids:
  - itlwm-fg-05a0c0a0-auxkc-approval-authority-isolation-boundary
  depends_on:
  - itlwm-rm-05a00-lab-ap-visibility-readiness
  description: >-
    Resolve the narrower blocker signature proven by rejection ea186f7: the
    selected-head AirportItlwm kext can be rebuilt and installed, the selected
    unsigned cdhash is present in the live UAKL/history state before and after
    reboot, and the installed UUID remains the selected UUID, but the post-reboot
    kmutil evaluation still exits 27 with the System Settings approval-required
    path. This step isolates the authoritative Tahoe approval surface that still
    controls the selected bundle and proves a concrete next autonomous mechanism
    for the approval/load-admission retry. It does not claim approval resolved,
    load admission, selected loaded UUID after reboot, join-trigger/PMK, AUTH,
    association, DHCP, data transfer, reconnect, or final Wi-Fi equivalence.
  acceptance:
  - A live Tahoe guest run with passthrough Wi-Fi attached records the selected
    installed bundle identity and the relevant post-reboot approval authority
    surfaces for the selected cdhash and bundle id.
  - The artifact proves that the remaining System Settings approval-required
    blocker has been classified into a concrete autonomous next mechanism, not
    a retry of the already-failed UAKL persistence route.
  - The artifact records the prior rejection signature, inspected policy/history
    surfaces, kernelmanagerd/syspolicyd evidence, and leaves approval resolved,
    load admission, loaded UUID, join-trigger/PMK, AUTH, association, DHCP, and
    final Wi-Fi equivalence criteria unclaimed.
  requires:
  - id: itlwm-rm-05a0c0a0-auxkc-approval-authority-isolation-boundary
    artifact: evidence/runtime/tahoe_auxkc_approval_authority_isolation_boundary.json
    checks:
      require_fields:
      - selected_step
      - input_head
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.wifi_passthrough_attached
      - selected_kext.input_head
      - selected_kext.installed_uuid
      - selected_kext.selected_cdhash
      - approval_authority.prior_blocker_signature
      - approval_authority.uakl_cdhash_present_after_reboot
      - approval_authority.kmutil_load_exit_code
      - approval_authority.kmutil_system_settings_approval_required
      - approval_authority.kext_policy_rows_inspected
      - approval_authority.kext_load_history_rows_inspected
      - approval_authority.syspolicyd_or_kernelmanagerd_evidence_present
      - approval_authority.classification
      - approval_authority.machine_actionable_surface_found
      - approval_authority.next_autonomous_mechanism
      - verdict.ready_for_approval_mechanism_retry
      - verdict.approval_resolved_not_claimed
      - verdict.load_admission_not_claimed
      - verdict.loaded_uuid_after_reboot_not_claimed
      - verdict.join_trigger_not_claimed
      - verdict.pmk_delivery_not_claimed
      - verdict.auth_tx_rx_not_claimed
      - verdict.final_wifi_equivalence_not_claimed
      min_number:
        capture_wallclock_seconds: 10
        approval_authority.kext_load_history_rows_inspected: 1
      equals:
        selected_step: step:itlwm-rm-05a0c0a0-auxkc-approval-authority-isolation-boundary
        runtime_environment.guest_wifi_interface: en1
        runtime_environment.wifi_passthrough_attached: true
        approval_authority.prior_blocker_signature: system_settings_approval_required_after_selected_install_uakl_persistence_and_reboot
        approval_authority.uakl_cdhash_present_after_reboot: true
        approval_authority.kmutil_system_settings_approval_required: true
        approval_authority.syspolicyd_or_kernelmanagerd_evidence_present: true
        approval_authority.machine_actionable_surface_found: true
        verdict.ready_for_approval_mechanism_retry: true
        verdict.approval_resolved_not_claimed: true
        verdict.load_admission_not_claimed: true
        verdict.loaded_uuid_after_reboot_not_claimed: true
        verdict.join_trigger_not_claimed: true
        verdict.pmk_delivery_not_claimed: true
        verdict.auth_tx_rx_not_claimed: true
        verdict.final_wifi_equivalence_not_claimed: true
      forbid_values:
        approval_authority.source:
        - synthetic
        - replay
        - static_fixture
        approval_authority.classification:
        - unknown
        - unclassified
        - prose_only

- id: itlwm-rm-05a0c0a1a-tahoe-gui-session-availability-boundary
  title: Tahoe GUI session availability for approval workflow
  goal_item_ids:
  - itlwm-fg-05a0c0a1a-tahoe-gui-session-availability-boundary
  depends_on:
  - itlwm-rm-05a0c0a0-auxkc-approval-authority-isolation-boundary
  description: >-
    Resolve the narrower environment blocker proven by rejection a7377f0: the
    selected AirportItlwm bundle is installed and kmutil still reaches the System
    Settings approval-required path, but the Tahoe guest has no logged-in Aqua GUI
    domain for the project user, so System Settings cannot launch and the approval
    alert/workflow cannot be exercised. This step establishes a live logged-in GUI
    session and launchable System Settings surface for the selected approval
    workflow without claiming that the approval alert is cleared, kmutil is
    admitted, the selected kext is loaded after reboot, join-trigger/PMK, AUTH,
    association, DHCP, or final Wi-Fi equivalence.
  acceptance:
  - A live Tahoe guest run with passthrough Wi-Fi attached reaches a logged-in GUI
    console session for the project user while SSH remains available.
  - The evidence proves the user GUI domain exists, WindowServer/loginwindow surface
    is usable, VNC or equivalent display access is live, and System Settings can
    be launched in that GUI domain.
  - The artifact records the prior approval-workflow blocker signature and leaves
    approval alert cleared, kmutil admission, selected loaded-after-reboot,
    join-trigger/PMK, AUTH, association, DHCP, and final Wi-Fi equivalence criteria
    unclaimed.
  requires:
  - id: itlwm-rm-05a0c0a1a-tahoe-gui-session-availability-boundary
    artifact: evidence/runtime/tahoe_gui_session_availability_boundary.json
    checks:
      require_fields:
      - selected_step
      - input_head
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.wifi_passthrough_attached
      - gui.prior_blocker_signature
      - gui.console_user
      - gui.console_uid
      - gui.gui_domain_available
      - gui.windowserver_running
      - gui.vnc_surface_available
      - gui.system_settings_launchable
      - approval_probe.kmutil_approval_error_still_present
      - verdict.ready_for_approval_alert_workflow_retry
      - verdict.approval_alert_cleared_not_claimed
      - verdict.load_admission_not_claimed
      - verdict.loaded_uuid_after_reboot_not_claimed
      - verdict.join_trigger_not_claimed
      - verdict.pmk_delivery_not_claimed
      - verdict.auth_tx_rx_not_claimed
      - verdict.final_wifi_equivalence_not_claimed
      min_number:
        capture_wallclock_seconds: 10
        gui.console_uid: 1
      equals:
        selected_step: step:itlwm-rm-05a0c0a1a-tahoe-gui-session-availability-boundary
        runtime_environment.guest_wifi_interface: en1
        runtime_environment.wifi_passthrough_attached: true
        gui.prior_blocker_signature: no_logged_in_gui_domain_for_system_settings_approval_workflow
        gui.console_user: devops
        gui.gui_domain_available: true
        gui.windowserver_running: true
        gui.vnc_surface_available: true
        gui.system_settings_launchable: true
        approval_probe.kmutil_approval_error_still_present: true
        verdict.ready_for_approval_alert_workflow_retry: true
        verdict.approval_alert_cleared_not_claimed: true
        verdict.load_admission_not_claimed: true
        verdict.loaded_uuid_after_reboot_not_claimed: true
        verdict.join_trigger_not_claimed: true
        verdict.pmk_delivery_not_claimed: true
        verdict.auth_tx_rx_not_claimed: true
        verdict.final_wifi_equivalence_not_claimed: true
      forbid_values:
        gui.source:
        - synthetic
        - replay
        - static_fixture


