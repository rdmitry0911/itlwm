version: project-final-goal/v1
project:
  id: itlwm
  name: itlwm Tahoe AirportItlwm parity
final_goal:
  id: itlwm-final-airportitlwm-tahoe-apple-wifi-parity
  statement: 'Драйвер на основе opensource airportitlwm, работающий в macOS Tahoe
    и функционально идентичный оригинальному Wi‑Fi драйверу Apple: закрывает те же
    системные контракты, payloads, consumer/producer цепочки, state machines, runtime
    behavior, diagnostics, power/wake и acceptance gates.'
  target_environment:
    os: macOS Tahoe
    base: opensource airportitlwm/itlwm lineage
    target: Intel Wi‑Fi adapters supported by airportitlwm
  equivalence_target: Apple original Wi‑Fi driver system contract surface
  non_goals:
  - paper-only closure without runtime evidence
  - host-side git mirror as source of truth
  - weakened Apple contract compatibility claims
completion_contract:
  finish_signal: original_roadmap_finished
  finish_requires:
  - all_final_goal_items_done
  - all_original_roadmap_items_done
  - acceptance_evidence_for_each_goal_item
  - no_idle_state_except_proven_operator_gate_or_original_roadmap_finished
  finish_verification:
  - deterministic_preflight_reconstructs_state_from_commits_final_goal_and_roadmap
  - simulator_accepts_no_unproven_idle_or_loop_class
  - auditor_accepts_goal_item_evidence_and_remaining_work_report
work_breakdown:
- id: itlwm-fg-01-lineage-tahoe-build
  title: airportitlwm lineage and Tahoe build/install substrate
  status: planned
  weight: 10
  acceptance_criteria:
  - source lineage is auditable to opensource airportitlwm
  - Tahoe build/install/load path is reproducible from committed sources
  - host does not substitute a private source mirror
  original_roadmap_ids:
  - itlwm-rm-01
- id: itlwm-fg-02-system-contract-inventory
  title: Apple Wi‑Fi system contract inventory
  status: planned
  weight: 15
  acceptance_criteria:
  - Apple driver-facing contracts are inventoried
  - contract gaps are represented as roadmap work not prose notes
  - each contract has payload/state-machine acceptance criteria
  original_roadmap_ids:
  - itlwm-rm-02
- id: itlwm-fg-03-payload-parity
  title: Payload and IOKit/IO80211 contract parity
  status: planned
  weight: 15
  acceptance_criteria:
  - all required payload shapes are produced/consumed
  - invalid payload/error semantics match accepted Apple-compatible behavior
  - payload evidence is captured in deterministic tests
  original_roadmap_ids:
  - itlwm-rm-03
- id: itlwm-fg-04-consumer-producer-state-machines
  title: Consumer/producer chains and state machines
  status: planned
  weight: 20
  acceptance_criteria:
  - association/auth/scan/data-path state machines are explicit
  - producer/consumer queues are ordered and backpressure-safe
  - state recovery after errors/wake is verified
  original_roadmap_ids:
  - itlwm-rm-04
- id: itlwm-fg-05a0-auth-response-ack-readiness
  title: Tahoe auth-response ACK readiness
  status: planned
  weight: 1
  acceptance_criteria:
  - live Tahoe lab evidence proves the station ACKs AP authentication responses
    before the WCL association/auth rollback gate is retried
  - the evidence is captured from the guest against an allowed lab AP from external
    lab/operator configuration, not from synthetic or replayed logs
  - the step does not claim association, DHCP, data, reconnect, or final Wi-Fi equivalence
  original_roadmap_ids:
  - itlwm-rm-05a0-auth-response-ack-readiness
  requires:
  - id: itlwm-fg-05a0-auth-response-ack-readiness
    artifact: evidence/runtime/tahoe_auth_response_ack_readiness.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.allowed_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association_target.visible_or_directed
      - auth.started
      - auth.ap_response_observed
      - auth.response_acknowledged
      - auth.did_not_ack_observed
      - auth.rsn_ie_mismatch_observed
      - candidate_fix.source_delta_committed
      - verdict.ready_for_wcl_auth_join_retry
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        association_target.visible_or_directed: true
        auth.started: true
        auth.ap_response_observed: true
        auth.response_acknowledged: true
        auth.did_not_ack_observed: false
        auth.rsn_ie_mismatch_observed: false
        candidate_fix.source_delta_committed: true
        verdict.ready_for_wcl_auth_join_retry: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        auth.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-05a-auth-join-readiness
  title: Tahoe WCL association/auth readiness
  status: planned
  weight: 2
  acceptance_criteria:
  - live Tahoe lab evidence proves the WCL association/auth path advances past the previous AUTH timeout/JOIN_ABORT rollback
  - the evidence is captured from the guest against an allowed lab AP, not from synthetic or replayed logs
  - the fix is committed as useful source delta and does not claim DHCP/data/reconnect closure
  original_roadmap_ids:
  - itlwm-rm-05a-auth-join-readiness
  requires:
  - id: itlwm-fg-05a-auth-join-readiness
    artifact: evidence/runtime/tahoe_auth_join_progress.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.lab_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association_target.published
      - auth.started
      - auth.timeout_observed
      - join_abort_observed
      - association.authenticated
      - association.associated
      - candidate_fix.source_delta_committed
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        association_target.published: true
        auth.started: true
        auth.timeout_observed: false
        join_abort_observed: false
        association.authenticated: true
        association.associated: true
        candidate_fix.source_delta_committed: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        association.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-05-runtime-wifi-equivalence
  title: Functional Wi‑Fi equivalence in Tahoe runtime
  status: planned
  weight: 20
  acceptance_criteria:
  - runtime-anchored Tahoe guest Wi-Fi session proves scan/join/auth/DHCP/data/reconnect
    against an allowed lab AP
  - scan/join/auth/DHCP/data transfer works in Tahoe
  - roaming/reconnect/power/wake scenarios are covered
  - AP/APSTA gaps are either closed or proven out of target scope
  original_roadmap_ids:
  - itlwm-rm-05
  requires:
  - id: itlwm-fg-05-runtime-wifi-equivalence-runtime-wifi-equivalence
    artifact: evidence/runtime/tahoe_wifi_session.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association.authenticated
      - association.associated
      - dhcp_lease.acquired
      - data_transfer.rx_bytes
      - reconnects.success_count
      - ap_apsta_scope.status
      min_number:
        capture_wallclock_seconds: 60
        scan.aps_seen: 1
        data_transfer.rx_bytes: 1048576
        reconnects.success_count: 1
      equals:
        driver.kext_loaded: true
        lab.ap_allowed: true
        association.authenticated: true
        association.associated: true
        dhcp_lease.acquired: true
        data_transfer.lab_ap_path: true
        ap_apsta_scope.status: out_of_target_scope_or_verified
      forbid_values:
        data_transfer.source:
        - synthetic
        - replay
        - loopback
        - static_fixture
        association.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-06-diagnostics-and-failure-semantics
  title: Diagnostics, telemetry and failure semantics
  status: planned
  weight: 8
  acceptance_criteria:
  - diagnostics match system expectations
  - recoverable/nonrecoverable errors are classified
  - no silent degradation is accepted
  original_roadmap_ids:
  - itlwm-rm-06
- id: itlwm-fg-07-deterministic-verification
  title: Deterministic verification and no-paper-closure discipline
  status: planned
  weight: 8
  acceptance_criteria:
  - preflight rebuilds working state from commits/final goal/roadmap
  - runtime evidence is required for closure
  - simulator catches adjacent no-progress and loop classes
  original_roadmap_ids:
  - itlwm-rm-07
- id: itlwm-fg-08-release-acceptance
  title: Release acceptance and rollback evidence
  status: planned
  weight: 4
  acceptance_criteria:
  - auditor accepts all contract evidence
  - remaining work is zero by goal contract
  - rollback/recovery procedures are documented and tested
  original_roadmap_ids:
  - itlwm-rm-08
