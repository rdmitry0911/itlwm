version: project-final-goal/v1
project:
  id: itlwm
  name: itlwm Tahoe AirportItlwm parity
final_goal:
  id: itlwm-final-airportitlwm-tahoe-apple-wifi-parity
  statement: 'Драйвер на основе opensource airportitlwm, работающий в macOS Tahoe
    и функционально идентичный оригинальному Wi‑Fi драйверу Apple: закрывает те же
    системные контракты, payloads, consumer/producer цепочки, state machines, runtime
    behavior, diagnostics, power/wake и acceptance gates.'
  target_environment:
    os: macOS Tahoe
    base: opensource airportitlwm/itlwm lineage
    target: Intel Wi‑Fi adapters supported by airportitlwm
  equivalence_target: Apple original Wi‑Fi driver system contract surface
  non_goals:
  - paper-only closure without runtime evidence
  - host-side git mirror as source of truth
  - weakened Apple contract compatibility claims
completion_contract:
  finish_signal: original_roadmap_finished
  finish_requires:
  - all_final_goal_items_done
  - all_original_roadmap_items_done
  - acceptance_evidence_for_each_goal_item
  - no_idle_state_except_proven_operator_gate_or_original_roadmap_finished
  finish_verification:
  - deterministic_preflight_reconstructs_state_from_commits_final_goal_and_roadmap
  - simulator_accepts_no_unproven_idle_or_loop_class
  - auditor_accepts_goal_item_evidence_and_remaining_work_report
work_breakdown:
- id: itlwm-fg-01-lineage-tahoe-build
  title: airportitlwm lineage and Tahoe build/install substrate
  status: planned
  weight: 10
  acceptance_criteria:
  - source lineage is auditable to opensource airportitlwm
  - Tahoe build/install/load path is reproducible from committed sources
  - host does not substitute a private source mirror
  original_roadmap_ids:
  - itlwm-rm-01
- id: itlwm-fg-02-system-contract-inventory
  title: Apple Wi‑Fi system contract inventory
  status: planned
  weight: 15
  acceptance_criteria:
  - Apple driver-facing contracts are inventoried
  - contract gaps are represented as roadmap work not prose notes
  - each contract has payload/state-machine acceptance criteria
  original_roadmap_ids:
  - itlwm-rm-02
- id: itlwm-fg-03-payload-parity
  title: Payload and IOKit/IO80211 contract parity
  status: planned
  weight: 15
  acceptance_criteria:
  - all required payload shapes are produced/consumed
  - invalid payload/error semantics match accepted Apple-compatible behavior
  - payload evidence is captured in deterministic tests
  original_roadmap_ids:
  - itlwm-rm-03
- id: itlwm-fg-04-consumer-producer-state-machines
  title: Consumer/producer chains and state machines
  status: planned
  weight: 20
  acceptance_criteria:
  - association/auth/scan/data-path state machines are explicit
  - producer/consumer queues are ordered and backpressure-safe
  - state recovery after errors/wake is verified
  original_roadmap_ids:
  - itlwm-rm-04
- id: itlwm-fg-05a0c0a0-auxkc-approval-authority-isolation-boundary
  title: Tahoe AuxKC approval authority isolation boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves which authoritative
    approval surface still controls the selected-head AirportItlwm bundle after
    selected rebuild/install, UAKL cdhash persistence, guest reboot, and the
    repeated kmutil System Settings approval-required result. The evidence must
    identify a concrete autonomous next mechanism for the approval/load-admission
    retry and must not close the approval, load-admission, selected loaded UUID,
    join-trigger/PMK, AUTH, association, DHCP, or final Wi-Fi equivalence gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0a0-auxkc-approval-authority-isolation-boundary
    passes from committed evidence/runtime/tahoe_auxkc_approval_authority_isolation_boundary.json.

- id: itlwm-fg-05a0c0-auxkc-approval-load-admission-boundary
  title: Tahoe AuxKC approval and load-admission boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the selected-head
    AirportItlwm kext is no longer blocked by the System Settings approval/load
    admission gate that prevented kmutil from admitting the selected build into
    the live AuxKC/load path. This step only resolves the approval/admission
    blocker; selected UUID loaded-after-reboot, join-trigger delivery, PMK
    delivery, AUTH, association, DHCP, and final Wi-Fi equivalence remain
    separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0-auxkc-approval-load-admission-boundary passes
    from committed evidence/runtime/tahoe_auxkc_approval_load_admission_boundary.json.

- id: itlwm-fg-05a0c0a1a-tahoe-gui-session-availability-boundary
  title: Tahoe GUI session availability for approval workflow
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the guest has a live
    logged-in GUI/Aqua session for the project user, usable display access, and a
    launchable System Settings surface before the System Settings approval alert
    workflow is retried. This step only resolves the GUI-session prerequisite;
    approval cleared, load admission, selected UUID loaded-after-reboot,
    join-trigger delivery, PMK delivery, AUTH, association, DHCP, and final Wi-Fi
    equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0a1a-tahoe-gui-session-availability-boundary
    passes from committed evidence/runtime/tahoe_gui_session_availability_boundary.json.


- id: itlwm-fg-05a0c0a1b-tahoe-admin-authorization-availability-boundary
  title: Tahoe admin authorization availability for approval workflow
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the live System Settings
    approval workflow can obtain a usable project-user admin authorization mechanism
    without committing or printing secret material. This step only resolves the admin
    authorization prerequisite for the approval workflow; approval cleared, load
    admission, selected UUID loaded-after-reboot, join-trigger delivery, PMK delivery,
    AUTH, association, DHCP, and final Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0a1b-tahoe-admin-authorization-availability-boundary
    passes from committed evidence/runtime/tahoe_admin_authorization_availability_boundary.json.

- id: itlwm-fg-05a0c0a1-system-settings-approval-alert-workflow-boundary
  title: Tahoe System Settings approval alert workflow boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the selected-head
    AirportItlwm bundle is cleared through the live System Settings or syspolicyd
    approval alert/workflow after policy/UAKL/MDM-row materialization and before
    the reboot-durability approval materialization retry. A truthful post-workflow
    kmutil result that no longer reports System Settings approval-required and now
    requires a reboot is the expected handoff to the next boundary, not a load-success
    claim. This step only resolves the live approval alert/work-queue boundary;
    selected UUID loaded-after-reboot, join-trigger delivery, PMK delivery, AUTH,
    association, DHCP, and final Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0a1-system-settings-approval-alert-workflow-boundary
    passes from committed evidence/runtime/tahoe_system_settings_approval_alert_workflow_boundary.json.

- id: itlwm-fg-05a0c0a-auxkc-approval-reboot-materialization-boundary
  title: Tahoe approval materialization across reboot boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the selected-head
    AirportItlwm kext approval materialization is not only written into the live
    policy state, but also survives a guest reboot and changes the subsequent
    kmutil load-admission result for the selected bundle. This step exists
    because the previous blocked attempt proved that selected rebuild/install
    plus live policy/UAKL mutation still left kernelmanagerd/syspolicyd on the
    System Settings approval-required path. This step only resolves that
    reboot/materialization boundary; selected UUID loaded-after-reboot,
    join-trigger delivery, PMK delivery, AUTH, association, DHCP, and final
    Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0a-auxkc-approval-reboot-materialization-boundary
    passes from committed evidence/runtime/tahoe_auxkc_approval_reboot_materialization_boundary.json.


- id: itlwm-fg-05a0c0b-source-stable-build-identity-boundary
  title: Tahoe source-stable build identity boundary
  description: >-
    A committed deterministic build-contract proof shows that Tahoe AirportItlwm
    runtime build identity is derived from source-bearing committed inputs rather
    than progress evidence/rejection commits. This prevents progress-only commits
    from forcing a new cdhash/UUID approval cycle before the AuxKC boot-safe load
    boundary can be retried. AuxKC boot-safe load, join-trigger delivery, PMK
    delivery, AUTH, association, DHCP, and final Wi-Fi equivalence remain
    separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0b-source-stable-build-identity-boundary passes
    from committed evidence/build/tahoe_source_stable_build_identity_report.json.


- id: itlwm-fg-05a0c0c-selected-identity-approval-refresh-boundary
  title: Tahoe selected identity GUI approval/restart handoff boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the current selected
    source-stable AirportItlwm bundle identity reaches the live System Settings
    approval workflow and produces a truthful restart-required handoff for that
    same selected UUID/CDHash after the source identity change. This step proves
    the GUI approval/work-queue handoff only; post-reboot load admission, selected
    loaded UUID after reboot, join-trigger delivery, PMK delivery, AUTH,
    association, DHCP, and final Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0c-selected-identity-approval-refresh-boundary
    passes from committed evidence/runtime/tahoe_selected_identity_approval_refresh_boundary.json.

- id: itlwm-fg-05a0c0d-selected-identity-post-reboot-approval-materialization-boundary
  title: Tahoe selected identity post-reboot approval materialization boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the selected
    source-stable AirportItlwm bundle approval handoff from System Settings
    survives a guest reboot and changes the subsequent kmutil load-admission
    result for the same selected UUID/CDHash. This step only resolves the
    post-reboot approval materialization boundary; AuxKC boot-safe loaded UUID,
    join-trigger delivery, PMK delivery, AUTH, association, DHCP, and final
    Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c0d-selected-identity-post-reboot-approval-materialization-boundary
    passes from committed evidence/runtime/tahoe_selected_identity_post_reboot_approval_materialization_boundary.json.

- id: itlwm-fg-05a0c-auxkc-boot-safe-load-boundary
  title: Tahoe selected AuxKC boot-safe load boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the selected-head
    AirportItlwm kext can be rebuilt, installed into the Auxiliary Kernel
    Collection, admitted past the already-proven approval/load gate, loaded with
    the passthrough Wi-Fi adapter attached, and return the guest to SSH without
    kernel panic before any join-trigger or PMK-helper claim is attempted.
    Join-trigger delivery, PMK delivery, AUTH TX/RX, AUTH response ACK,
    association, DHCP, and final Wi-Fi equivalence remain separate gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c-auxkc-boot-safe-load-boundary passes from
    committed evidence/runtime/tahoe_auxkc_boot_safe_load_boundary.json.

- id: itlwm-fg-05a0c-join-trigger-pmk-helper-delivery-boundary
  title: Tahoe join-trigger and PMK helper delivery boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that a live guest join
    trigger reaches the driver/PLTI association-target path and that the PMK
    helper daemon/keychain path delivers the PMK for the same allowed AP without
    storing AP secrets in committed project files. AUTH TX/RX completion, AUTH
    response ACK, association, DHCP, and final Wi-Fi equivalence remain separate
    gates.
  criteria:
  - Typed evidence itlwm-rm-05a0c-join-trigger-pmk-helper-delivery-boundary passes
    from committed evidence/runtime/tahoe_join_trigger_pmk_delivery_boundary.json.

- id: itlwm-fg-05a0b0-auth-mgmt-tx-enqueue-drain-boundary
  title: Tahoe AUTH management frame TX enqueue/drain boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that after live join-trigger
    and PMK delivery the AUTH(seq=1) management frame is enqueued and drained into
    the iwn TX path during an allowed AP attempt. This split exists because the
    previous AUTH TX/RX completion attempt proved AUTH start, RXON BSS filter, and
    response-window observability, but no IWN_TX_DONE completion was observed
    before the firmware fault. This step does not claim firmware TX completion,
    AUTH response ACK, association, DHCP, or final Wi-Fi equivalence.
  criteria:
  - Typed evidence itlwm-rm-05a0b0-auth-mgmt-tx-enqueue-drain-boundary passes
    from committed evidence/runtime/tahoe_auth_mgmt_tx_enqueue_drain_boundary.json.

- id: itlwm-fg-05a0b-auth-tx-rx-completion-boundary
  title: Tahoe iwn AUTH TX/RX completion publication boundary
  description: >-
    A committed, runtime-anchored Tahoe lab run proves that the iwn AUTH path can
    publish AUTH(seq=1) TX completion and an observable AUTH(seq=2) response
    window from an allowed operator-configured lab AP attempt without claiming
    AUTH response ACK, association, DHCP, or final Wi-Fi equivalence.
  criteria:
  - Typed evidence itlwm-rm-05a0b-auth-tx-rx-completion-boundary passes from
    committed evidence/runtime/tahoe_auth_tx_rx_completion_boundary.json.

- id: itlwm-fg-05a0-auth-response-ack-readiness
  title: Tahoe auth-response ACK readiness
  status: planned
  weight: 1
  acceptance_criteria:
  - live Tahoe lab evidence proves the station ACKs AP authentication responses
    before the WCL association/auth rollback gate is retried
  - the evidence is captured from the guest against an allowed lab AP from external
    lab/operator configuration, not from synthetic or replayed logs
  - the step does not claim association, DHCP, data, reconnect, or final Wi-Fi equivalence
  original_roadmap_ids:
  - itlwm-rm-05a0-auth-response-ack-readiness
  requires:
  - id: itlwm-fg-05a0-auth-response-ack-readiness
    artifact: evidence/runtime/tahoe_auth_response_ack_readiness.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.allowed_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association_target.visible_or_directed
      - auth.started
      - auth.ap_response_observed
      - auth.response_acknowledged
      - auth.did_not_ack_observed
      - auth.rsn_ie_mismatch_observed
      - candidate_fix.source_delta_committed
      - verdict.ready_for_wcl_auth_join_retry
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        association_target.visible_or_directed: true
        auth.started: true
        auth.ap_response_observed: true
        auth.response_acknowledged: true
        auth.did_not_ack_observed: false
        auth.rsn_ie_mismatch_observed: false
        candidate_fix.source_delta_committed: true
        verdict.ready_for_wcl_auth_join_retry: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        auth.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-05a00-lab-ap-visibility-readiness
  title: Tahoe lab AP visibility readiness
  status: planned
  weight: 1
  acceptance_criteria:
  - live Tahoe lab evidence proves an allowed external lab AP is visible to the guest
    Wi-Fi interface before auth-response ACK work is retried
  - AP configuration is external/operator-provided and committed evidence does not
    contain secret material
  - authentication response ACK, association, DHCP, data, reconnect and final Wi-Fi
    equivalence remain separate gates
  original_roadmap_ids:
  - itlwm-rm-05a00-lab-ap-visibility-readiness
  requires:
  - id: itlwm-fg-05a00-lab-ap-visibility-readiness
    artifact: evidence/runtime/tahoe_lab_ap_visibility_readiness.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.allowed_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - lab.secret_material_committed
      - scan.source
      - scan.aps_seen
      - scan.allowed_ap_visible
      - scan.allowed_ap_observations
      - candidate_fix.source_delta_committed
      - verdict.ready_for_auth_response_ack_retry
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      min_length:
        scan.allowed_ap_observations: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        lab.secret_material_committed: false
        scan.allowed_ap_visible: true
        candidate_fix.source_delta_committed: true
        verdict.ready_for_auth_response_ack_retry: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        lab.ap_identifier_source:
        - committed_secret
- id: itlwm-fg-05a-auth-join-readiness
  title: Tahoe WCL association/auth readiness
  status: planned
  weight: 2
  acceptance_criteria:
  - live Tahoe lab evidence proves the WCL association/auth path advances past the previous AUTH timeout/JOIN_ABORT rollback
  - the evidence is captured from the guest against an allowed lab AP, not from synthetic or replayed logs
  - the fix is committed as useful source delta and does not claim DHCP/data/reconnect closure
  original_roadmap_ids:
  - itlwm-rm-05a-auth-join-readiness
  requires:
  - id: itlwm-fg-05a-auth-join-readiness
    artifact: evidence/runtime/tahoe_auth_join_progress.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - runtime_environment.guest_os
      - runtime_environment.guest_wifi_interface
      - runtime_environment.lab_ap_identifier
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association_target.published
      - auth.started
      - auth.timeout_observed
      - join_abort_observed
      - association.authenticated
      - association.associated
      - candidate_fix.source_delta_committed
      min_number:
        capture_wallclock_seconds: 30
        scan.aps_seen: 1
      equals:
        runtime_environment.guest_wifi_interface: en1
        driver.kext_loaded: true
        lab.ap_allowed: true
        association_target.published: true
        auth.started: true
        auth.timeout_observed: false
        join_abort_observed: false
        association.authenticated: true
        association.associated: true
        candidate_fix.source_delta_committed: true
      forbid_values:
        scan.source:
        - synthetic
        - replay
        - static_fixture
        association.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-05-runtime-wifi-equivalence
  title: Functional Wi‑Fi equivalence in Tahoe runtime
  status: planned
  weight: 20
  acceptance_criteria:
  - runtime-anchored Tahoe guest Wi-Fi session proves scan/join/auth/DHCP/data/reconnect
    against an allowed lab AP
  - scan/join/auth/DHCP/data transfer works in Tahoe
  - roaming/reconnect/power/wake scenarios are covered
  - AP/APSTA gaps are either closed or proven out of target scope
  original_roadmap_ids:
  - itlwm-rm-05
  requires:
  - id: itlwm-fg-05-runtime-wifi-equivalence-runtime-wifi-equivalence
    artifact: evidence/runtime/tahoe_wifi_session.json
    checks:
      require_fields:
      - capture_wallclock_seconds
      - driver.kext_loaded
      - lab.ap_allowed
      - scan.aps_seen
      - association.authenticated
      - association.associated
      - dhcp_lease.acquired
      - data_transfer.rx_bytes
      - reconnects.success_count
      - ap_apsta_scope.status
      min_number:
        capture_wallclock_seconds: 60
        scan.aps_seen: 1
        data_transfer.rx_bytes: 1048576
        reconnects.success_count: 1
      equals:
        driver.kext_loaded: true
        lab.ap_allowed: true
        association.authenticated: true
        association.associated: true
        dhcp_lease.acquired: true
        data_transfer.lab_ap_path: true
        ap_apsta_scope.status: out_of_target_scope_or_verified
      forbid_values:
        data_transfer.source:
        - synthetic
        - replay
        - loopback
        - static_fixture
        association.source:
        - synthetic
        - replay
        - static_fixture
- id: itlwm-fg-06-diagnostics-and-failure-semantics
  title: Diagnostics, telemetry and failure semantics
  status: planned
  weight: 8
  acceptance_criteria:
  - diagnostics match system expectations
  - recoverable/nonrecoverable errors are classified
  - no silent degradation is accepted
  original_roadmap_ids:
  - itlwm-rm-06
- id: itlwm-fg-07-deterministic-verification
  title: Deterministic verification and no-paper-closure discipline
  status: planned
  weight: 8
  acceptance_criteria:
  - preflight rebuilds working state from commits/final goal/roadmap
  - runtime evidence is required for closure
  - simulator catches adjacent no-progress and loop classes
  original_roadmap_ids:
  - itlwm-rm-07
- id: itlwm-fg-08-release-acceptance
  title: Release acceptance and rollback evidence
  status: planned
  weight: 4
  acceptance_criteria:
  - auditor accepts all contract evidence
  - remaining work is zero by goal contract
  - rollback/recovery procedures are documented and tested
  original_roadmap_ids:
  - itlwm-rm-08
