local_before_cr_184:
  files:
    - "include/Airport/IO80211Peer.h"
  mismatch: "CR-177/CR-183 declared 31 Peer helpers covering identity, capability, credit, and counter accessors. Per-band RSSI accounting, real-time packet-stats queries, cache-state helpers, and queue/lifetime helpers were missing"
  consequence: "any future caller wanting to push per-band RSSI, query real-time/cumulative packet stats, manage Peer cache state, or drive queue/lifetime helpers would need per-callsite extern declarations with mangled signatures"

local_fix_cr_184:
  supersedes: "CR-183"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211Peer.h"
  changes:
    - "extend `class IO80211Peer` with thirty-three non-virtual public method declarations"
    - "declare two stats-id helpers (`getStatsID`, `getStatsIDValid`)"
    - "declare two RSSI reporters (`reportRssi`, `reportChainRssi`)"
    - "declare six per-band RSSI getters/setters (24G/5G/AcrossBands/ChainRssi5G plus two setters)"
    - "declare five resource/queue helpers (`simulateDPS`, `freeResources`, `unpauseQueues`, `reclaimPackets`, `clearCacheState`)"
    - "declare three RX bit-field/count helpers (`getRxBitField`, `getRxBitFieldMulticast`, `incrementRxCount`)"
    - "declare four packet-stats accessors (`getPacketStats`, `getPacketStatsRealTimeRx`, `getPacketStatsRealTimeTx`, `getCumDataStats`)"
    - "declare three predicate helpers (`hasRealTimeData`, `hasLowLatencyData`, `hasQueuedPackets`)"
    - "declare four queue-state/lifetime helpers (`getDataLinkCount`, `logPeerTxLatency`, `updateQueueState`, `setPacketLifetime`)"
    - "declare two cache-timestamp helpers (`getCacheTimeStamp`, `setCacheTimeStamp`)"
    - "declare two BSS-steering predicates (`isBssSteeringPeer`, `isBssSteeringPeerSyncState`)"
    - "add forward declaration for `apple80211_channel`"
    - "anchor each declaration to its BootKC address in the header preamble"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
