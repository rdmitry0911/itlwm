      - { sym: "IO80211PeerManager::getPeerStats(apple80211_peer_stats*)", addr: "ffffff80021d298e", returns: "IOReturn" }

local_before_cr_176:
  files:
    - "include/Airport/*"
  mismatch: "no canonical IO80211PeerManager header in the local include tree; class only forward-declared in IO80211SkywalkInterface.h, IO80211Interface.h, IO80211VirtualInterface.h, IO80211P2PInterface.h"
  consequence: "any future caller wanting to invoke peer add/remove/list/stats would have to add per-callsite extern declarations with mangled signatures"

local_fix_cr_176:
  supersedes: "CR-175"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211PeerManager.h"
  changes:
    - "create new header `include/Airport/IO80211PeerManager.h`"
    - "declare `class IO80211PeerManager` as opaque (no base class, no data, no vtable)"
    - "declare `IO80211Peer *addPeer(unsigned char *)`  # CR-205 corrected from IOReturn"
    - "declare `IOReturn addPeerOperation(void)`"
    - "declare `void removePeer(IO80211Peer *)`"
    - "declare `IOReturn removePeer(unsigned char *)`"
    - "declare `IOReturn removePeerOperation(void)`"
    - "declare `void *getPeerList(void)`"
    - "declare `IOReturn getPeerStats(apple80211_peer_stats *)`"
    - "forward-declare `class IO80211Peer` and `struct apple80211_peer_stats`"
    - "anchor each declaration to its BootKC address in the header preamble"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    sha256_post: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    uuid_pre: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    uuid_post: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    regdiag_sha256: "6915020cdd70a07c4b77b2946dd5605bc378fc0677119506ae691a7968f01fad"
    note: "no live code references the new declarations yet, so generated binary is bit-identical to CR-175"
  non_claims:
    - "does not synthesize AppleBCMWLANPCIeSkywalkPacket"
    - "does not write packet+0x78"
    - "does not change packet allocation, queueing, input, or output behavior"
    - "does not force EAPOL TX, key install, RSN, DHCP, link, or data success"
    - "does not add retry, replay, delay, poll loop, packet synthesis, or deauth masking"
    - "does not call any of the seven peer-management methods from any local code path"
    - "does not declare IO80211PeerManager with any base class or data layout"

deferred_work:
  caller_wiring:
    status: "open"
    blockers:
      - "thread/gate context for addPeer / addPeerOperation"
      - "writer of IO80211InfraInterface this[0x24]+0x58 == 1 precondition for setLinkState(state=2)"
      - "ordering of setCurrentApAddress vs setLinkState"
      - "handleKeyDone body recovery via raw disasm at 0xffffff80022e6f9c"
    note: "wired CR will be CR-177+ after these gates are decompile-confirmed"

verification_plan:
  structural:
    - "git diff --check"
    - "targeted YAML parse"
    - "scripts/build_tahoe.sh"
    - "scripts/build_regdiag.sh"
    - "BootKC undef-symbol verification — must remain 884 resolved"
  after_runtime:
    - "no runtime expectation: CR-176 has no caller wiring, so kext is bit-identical to CR-175"
    - "pre-existing CR-175 runtime baseline (eapol_rx=8, eapol_tx=0, IO80211RSNDone=No) remains the active blocker for the next CR"
