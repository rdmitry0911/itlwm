    - "regdiag counters include eapol_rx=8 and eapol_tx=0"
    - "IORegistry reports IO80211RSNDone=No"
    - "no setCIPHER_KEY appears before AP deauth reason 15"
  use_in_this_batch: "no runtime change yet — CR-176 only widens the locally declared API surface so future caller wiring can link against documented BootKC peer-management symbols"

reference:
  io80211family:
    binary: "/srv/project/ghidra_output/IO80211Family_decompiled.c"
    symbol_table: "/srv/project/ghidra_additional/kc_target_symbols.txt"
    direct_call_helpers:
      - { sym: "IO80211PeerManager::addPeer(unsigned char*)", addr: "ffffff80021d3f58", returns: "IO80211Peer *", note: "CR-205: corrected from IOReturn to IO80211Peer * based on raw x86_64 disasm; see analysis/cr205_addpeer_disasm.txt" }
      - { sym: "IO80211PeerManager::addPeerOperation()", addr: "ffffff80021d7ba0", returns: "IOReturn" }
      - { sym: "IO80211PeerManager::removePeer(IO80211Peer*)", addr: "ffffff80021d4452", returns: "void" }
      - { sym: "IO80211PeerManager::removePeer(unsigned char*)", addr: "ffffff80021d4806", returns: "IOReturn" }
      - { sym: "IO80211PeerManager::removePeerOperation()", addr: "ffffff80021d7c7e", returns: "IOReturn" }
