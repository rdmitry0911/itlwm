  04 02 04 01 04 07 04 01 04 01 04 07 ff 00 ff 00 00 01 04 01

behavioral_notes:
  gas_protocol: >-
    Generic Advertisement Service (GAS) query/response protocol FSM.
    Manages the lifecycle of GAS queries used for ANQP (Access Network
    Query Protocol) and Hotspot 2.0 operations.
  busy_rejection: >-
    New GAS_REQUEST events during active processing (IN_PROGRESS,
    GETTING_RESULT, ABORTING, HALTED) invoke busy() — rejects the
    request without state change.
  abort_path: >-
    Multiple error conditions lead to ABORTING: DRIVER_RESET,
    GAS_COMPLETE_ERROR, GAS_QUERY_TIMEOUT, explicit ABORT. From
    ABORTING, completion events drain back to IDLE.
  halted_state: >-
    HALTED is entered via QUIESCE from any active state. It absorbs
    most events silently. Only WAKE exits HALTED (back to IDLE).
    GAS_COMPLETE/GAS_COMPLETE_ERROR still processed via
    processGasCompleteInIdleOrAborting to clean up pending state.
  fragment_handling: >-
    GAS_FRAG_RX in IN_PROGRESS transitions to GETTING_RESULT and
    continues accumulating fragments there. Works in tandem with
    GAS_DEFRAG_FSM for fragment reassembly.
