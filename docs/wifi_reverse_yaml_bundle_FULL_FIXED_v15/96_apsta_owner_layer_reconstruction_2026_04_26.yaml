          - "queue list"
          - "numTxQueues + 2"
          - "state+0x2d8 TX packet pool"
          - "state+0x2e0 RX packet pool"
          - "0 flags"
        flags: 0
      failure_cleanup: "remove work sources for TX queues, TX completion, RX completion, and multicast queue"
