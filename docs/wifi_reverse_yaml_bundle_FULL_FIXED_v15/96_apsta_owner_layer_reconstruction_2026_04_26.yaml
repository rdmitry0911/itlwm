      - { offset: "state+0x248", source: "core expansion +0x1590", meaning: "resource retained by init and released by freeResources" }
      - { offset: "state+0x228", source: "core expansion +0x1520", meaning: "resource captured by init" }
      - { offset: "state+0x210", source: "owner/core logger vtable +0xd68", meaning: "APSTA logger/bytestream resource" }
      - { offset: "state+0x250", source: "core expansion +0x1598", meaning: "resource retained by init and released by freeResources" }
      - { offset: "state+0x260", source: "core expansion +0x1558", meaning: "resource retained by init and released by freeResources" }
