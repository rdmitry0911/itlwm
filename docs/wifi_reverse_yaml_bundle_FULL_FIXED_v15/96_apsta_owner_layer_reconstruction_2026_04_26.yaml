        - { offset: "0x08", field: "txSubQueues[1]", value: "state+0x308" }
        - { offset: "0x10", field: "txSubQueues[2]", value: "state+0x310" }
        - { offset: "0x18", field: "txSubQueues[3]", value: "state+0x318" }
        - { offset: "0x20", field: "txCompQueue", value: "state+0x2e8" }
        - { offset: "0x28", field: "rxCompQueue", value: "state+0x2f0" }
