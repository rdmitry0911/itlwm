datapath_activation:
  helper_resource:
    function: "FUN_ffffff8001694064"
    address: "0xffffff8001694064"
    contract: "return *(void **)(state+0x210)"
    local_field: "AirportItlwmAPSTAStateBlock::resource210"
  bytestream_users:
    - "handleEvent(wl_event_msg_t*) uses state+0x210 for APSTA/SoftAP event bytestream traces"
    - "handleSetRpsNoaAsyncCallBack uses state+0x210 for RPSNOA IOVAR rxPayload bytestream"
    - "handleSetBcnIntervalAsyncCallBack uses state+0x210 for BCNPRD IOCTL rxPayload bytestream"
  activation_owner:
    field: "state+0x2d0"
    local_field: "AirportItlwmAPSTAStateBlock::datapathOwner2d0"
    enable: "enableDatapath calls vtable +0x120 on state+0x2d0 before starting TX/RX completion queues"
    disable: "disableDatapath calls vtable +0x128 on state+0x2d0 before stopping RX/TX completion queues"
    failure_code_for_missing_queue: "0xe00002bc"
    lifecycle_vtable_offsets:
      interface_enabled_gate: "0xcf0"
      owner_enable: "0x120"
      owner_disable: "0x128"
      completion_queue_start: "0x150"
      completion_queue_stop: "0x158"
      rx_completion_arm: "0x298"
      rx_completion_arm_args: [0, 0]
    enable_sequence:
      - "call interface enabled gate vtable +0xcf0"
      - "if interface is not enabled, return 0xe00002bc without owner/queue activation"
      - "call state+0x2d0 owner vtable +0x120"
      - "start state+0x2e8 TX completion queue with vtable +0x150"
      - "start state+0x2f0 RX completion queue with vtable +0x150"
      - "arm state+0x2f0 RX completion queue with vtable +0x298 and args 0,0"
    disable_sequence:
      - "call state+0x2d0 owner vtable +0x128"
      - "stop state+0x2f0 RX completion queue with vtable +0x158"
      - "stop state+0x2e8 TX completion queue with vtable +0x158"
  non_claims:
    - "does not instantiate APSTA"
    - "does not allocate the datapath owner"
    - "does not return role-7 success"

