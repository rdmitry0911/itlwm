      - { offset: "state+0x14", value: "0x12c" }
      - { offset: "state+0x2a4", value: 4, meaning: "number of APSTA TX queues" }
      - { offset: "state+0x2a8..0x2b4", value: [0, 1, 2, 3], meaning: "start-time TX queue service-class map" }
    failure_path: "on missing required resource, log exact failure and call freeResources(); no forced success"
  start:
    function: "AppleBCMWLANIO80211APSTAInterface::start(AppleBCMWLANCore*, IOSkywalkEthernetInterface::RegistrationInfo*)"
    address: "0xffffff8001686378"
    writes:
      - { offset: "state+0x210", source: "interface logger vtable +0xd18 when available" }
      - { offset: "state+0x330", source: "core work queue vtable +0xc68" }
      - { offset: "state+0x2c8", source: "core expansion +0x1510", meaning: "bus/provider object" }
      - { offset: "state+0x2d0", source: "bus/provider vtable +0xbc0 cast to AppleBCMWLANBusSkywalk", meaning: "datapath owner" }
    queue_config_layout:
      local_type: "AirportItlwmAPSTAStartQueueConfigLayout"
      passed_to: "state+0x2d0 vtable +0x118"
