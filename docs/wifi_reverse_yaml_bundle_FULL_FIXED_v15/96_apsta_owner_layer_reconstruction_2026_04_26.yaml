class_topology:
  apple_protocol_base: IO80211SapProtocol
  apple_concrete_class: AppleBCMWLANIO80211APSTAInterface
  evidence:
    - "APSTA destructor calls IO80211SapProtocol destructor."
    - "kdk_symbols exports IO80211SapProtocol metaclass/vtable and APSTA concrete methods."
    - "resolved vtable dump shows IO80211SapProtocol vtable at 0xffffff80023e8dc0 and APSTA vtable at 0xffffff8001777508."
  local_requirement:
    - "recover IO80211SapProtocol header/vtable shape before exposing APSTA selectors"
    - "implement local AirportItlwm APSTA owner as the APSTA/SAP object, not as primary STA method stubs"
    - "do not derive APSTA directly from the current primary STA class because the SAP/APSTA vtable has different slots"

