apsta_owner_principle:
  rule: >
    Missing Apple-required classes, owner objects, state blocks, queues, or
    carrier structures are reconstruction requirements. They are not permanent
    exclusions from the port.
  implication: >
    APSTA and SoftAP must be restored as a separate SAP/APSTA owner layer. The
    primary STA interface may keep the interim role-7 no-owner failure shape
    only until the APSTA owner object and lifecycle are implemented.

