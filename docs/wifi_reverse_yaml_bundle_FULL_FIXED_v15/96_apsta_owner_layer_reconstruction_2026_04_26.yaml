hostap_control_state:
  set_host_ap_mode:
    function: "AppleBCMWLANIO80211APSTAInterface::setHOST_AP_MODE(apple80211_network_data*)"
    address: "0xffffff80016884ae"
    local_network_data_layout: "AirportItlwmAPSTAHostApModeNetworkDataLayout"
    input_offsets:
      flags: "input+0x04"
      mode: "input+0x1c"
      vendor_ie_length: "input+0x2dc"
      vendor_ie_data: "input+0x2e0"
    contract: >
      coordinate proximity owner at core expansion +0x2c28 and NAN owners at
      +0x74f0/+0x74f8 around setHostApModeInternal; feature gate 0x46 controls
      the bringdown/bringup path.
    neighbouring_owners:
      core_private_source: "state+0x218 -> +0x128"
      proximity_owner: "+0x2c28"
      nan_owner: "+0x74f0"
      nan_data_owner: "+0x74f8"
    enable_path:
      condition: "input != NULL and *(uint32_t *)(input+0x1c) != 0"
      feature_gate: "0x46"
      gate_disabled_side_effects:
        - "bring down proximity owner when present"
        - "bring down NAN owner when present"
        - "bring down NAN data owner when present"
      tail: "return setHostApModeInternal(input)"
    disable_or_zero_mode_path:
      condition: "input == NULL or *(uint32_t *)(input+0x1c) == 0"
      internal_call: "setHostApModeInternal(input)"
      feature_gate: "0x46"
      bringup_gate:
        private_flag: "+0x2890 & 1"
        mode_field: "+0x4d8c"
        accepted_values: [4, 1]
      side_effects:
        - "bring up proximity owner when present and gate passes"
        - "bring up NAN owner when present and gate passes"
        - "bring up NAN data owner when present and gate passes"
  internal:
    function: "AppleBCMWLANIO80211APSTAInterface::setHostApModeInternal(apple80211_network_data*)"
    address: "0xffffff8001688bc2"
    state_operands:
      - { offset: "state+0x26c", use: "AP-up state; tested before shutdown and set to 1 on successful AP enable" }
      - { offset: "state+0x270", use: "HostAP transition/in-progress state; tested and written by internal state machine" }
      - { offset: "state+0x20c", use: "AP stats/inactivity accumulator cleared on enable" }
      - { offset: "state+0x14", use: "beacon interval/default timing field updated on enable" }
      - { offset: "state+0xb4", use: "AP low-power/power state consulted by low-power exit path" }
      - { offset: "state+0x228", use: "commander used for virtual IOVAR sequence" }
  hidden_mode:
    function: "AppleBCMWLANIO80211APSTAInterface::setHOST_AP_MODE_HIDDEN(apple80211_host_ap_mode_hidden_t*)"
    address: "0xffffff800168d970"
    contract: "validate interface up, send closednet virtual IOVAR, write state+0x0d, clear state+0x0e on shutdown branch"
  power_assertion:
    function: "AppleBCMWLANIO80211APSTAInterface::holdSoftAPPowerAssertion()"
    address: "0xffffff800168dbc2"
    contract: "write state+0x0c = 1 and notify core power/assertion path"
  power_off:
    function: "AppleBCMWLANIO80211APSTAInterface::hostAPPowerOff()"
    address: "0xffffff8001692772"
    contract: "if AP is up, set power-save state, clear state+0x0e, call setHostApModeInternal(NULL), then notify owner/core"
    default_return: 0
    ap_up_state: "state+0x26c"
    associated_count: "state+0x00"
    no_associated_sta_path:
      condition: "state+0x26c != 0 and state+0x00 == 0"
      set_power_save_state_args: [0, "0x0c"]
      clear: "state+0x0e = 0"
      internal_call: "setHostApModeInternal(NULL)"
      notify:
        function: "0xffffff8002219ffe"
        event_id: 1
        payload: NULL
        payload_size: 0
        flag: 1
    associated_sta_path:
      condition: "state+0x26c != 0 and state+0x00 != 0"
      if_concurrency_disabled: "setPowerSaveState(3, 3)"
  softap_concurrency:
    function: "AppleBCMWLANIO80211APSTAInterface::isSoftAPConcurrencyEnabled()"
    address: "0xffffff8001692896"
    feature_gate: "0x46"
    core_private_byte: "+0x4d59"
    mask: "0x1b"
    contract: "true only when feature 0x46 is enabled and core-private +0x4d59 has one of mask bits 0x1b set"
  low_power_exit:
    function: "AppleBCMWLANIO80211APSTAInterface::configureLowPowerModeExit()"
    address: "0xffffff80016928e4"
    contract: "return early when state+0xb4 is zero; otherwise dispatch low-power exit work"
    low_power_state: "state+0xb4"
    workqueue_gate_vtable_offset: "0x130"
    command_payload_size: 4
    success_write: "state+0xb4 = 0"
  local_scaffold:
    file: "AirportItlwm/AirportItlwmAPSTAInterface.hpp"
    fields:
      - "powerAssertionFlag0c"
      - "hiddenNetworkFlag0d"
      - "softapPowerStateB4"
      - "hostApTransitionState270"
    layouts:
