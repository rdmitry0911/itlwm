        - { offset: "0x48", field: "rxPacketPoolStorage", value: "&state+0x2e0" }
        - { offset: "0x58", field: "logger", value: "interface logger" }
    after_queue_creation:
      - "if multicast queue exists, add it to state+0x330 work queue"
      - "register TX queues and completion queues as work sources"
      - "register Ethernet interface using all queues and packet pools"
    work_source_registration:
      source_range: "0xffffff80016865a2..0xffffff800168689d"
      work_queue: "state+0x330"
      add_source_vtable_offset: "0x140"
      remove_source_vtable_offset: "0x148"
      tx_queue_trap_threshold: 7
      max_accepted_tx_queues: 6
      add_order:
