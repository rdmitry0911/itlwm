        - { offset: "0x10", field: "txQueueServiceClassMap", value: "&state+0x2a8" }
        - { offset: "0x18", field: "txSubQueues", value: "&state+0x300" }
        - { offset: "0x20", field: "resource2f8Storage", value: "&state+0x2f8" }
