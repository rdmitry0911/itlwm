  io80211_sap_protocol_vtable: "0xffffff80023e8dc0"
  apsta_vtable: "0xffffff8001777508"
  local_sap_contract_scaffold:
    file: "include/Airport/IO80211SapProtocol.h"
    status: "compiled contract header only; no ABI class definition yet"
    reason_no_class_definition_yet: >
      The recovered APSTA forwardPacket override occupies a Skywalk/SAP slot
      whose local primary-STA header is still named for a different carrier.
      A simple subclass of the current local IO80211SkywalkInterface would
      therefore be ABI-wrong. The header records the slot contract first; the
      full SAP class must use a separately recovered exact slot map.
