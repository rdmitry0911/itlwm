    - "declare `bool getDataPathOpen(void)`"
    - "declare `void setDataPathOpen(bool)`"
    - "declare `void setDataPathState(bool)`"
    - "declare `void lockDataPath(void)`"
    - "declare `void unlockDataPath(void)`"
