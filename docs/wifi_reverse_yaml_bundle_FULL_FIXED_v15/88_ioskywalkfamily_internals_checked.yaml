# ═══════════════════════════════════════════════════════════════
#   FULL BSD INTERFACE CREATION SEQUENCE (consolidated)
# ═══════════════════════════════════════════════════════════════

bsd_ifnet_creation_sequence:
  description: >-
    Complete timeline from driver start to BSD en0 appearing.
    Synthesized from all four decompilation passes.

  phase_1_start:
    trigger: "IOService matching attaches IOSkywalkNetworkBSDClient to IOSkywalkNetworkInterface"
    calls:
      - "IOSkywalkClient::start (grandparent)"
      - "IOSkywalkBSDClient::start (0xa2b74c): openInterface, registerClient, setupBSDName, createNexusRegistration, set IOSkywalkNexusUUID, registerService"
      - "IOSkywalkNetworkBSDClient::start (0xa2c574): super::start, poison-init params, metaclass check"
    result: "BSDClient is registered, nexus registration created, but NO ifnet yet"

  phase_2_nexus_ready:
    trigger: "Skywalk nexus system calls back when channel is ready (async)"
    calls:
      - "prepareNexusCallback (0xa2d3f4): stores nexus channel at self+0x100, dispatches gatedPrepareNexus on command gate"
      - "gatedPrepareNexus (0xa2d720): calls networkInterface->registerBSDInterface(ifnet, 0) at vtable 0x8e8"
      - "  → prepareBSDInterface (0xa379de): stores ifnet, sets baudrate/TSO/BPF/LRO"
      - "  → finalizeBSDInterface (overridden by subclass — base panics)"
      - "  → setBSDName (0xa37b04): copies name to nifCtx+0x41"
      - "Stores ifnet at self+0xf8, configures nexus channel, sets nexusPrepared=1"
    result: "BSD ifnet (en0) is NOW CREATED and visible to networking stack"

  phase_3_connect:
    trigger: "Network stack or driver calls connect"
    calls:
      - "preConnect (0xa2d9c0): registerClient, preConnectAction on gate"
      - "connectedAction (0xa2da3a): connected=1, adjustInterfaceEnable"
      - "enableInterface (0xa2d84e): enables BSD interface, reports wake flags, updates link state"
    result: "Interface is connected and enabled"

  phase_4_ioctl:
    trigger: "BSD stack sends SIOCSIFFLAGS (0x80206910)"
    handler: "ioctlHandler (0xa2ccf8): power management, IFF_UP/IFF_RUNNING, adjustInterfaceEnable"

  phase_5_teardown:
    trigger: "Interface removal or driver stop"
    calls:
      - "preDisconnect: connected=0, adjustInterfaceEnable"
      - "disconnected: deregisterClient"
      - "detachInterface: recursive Skywalk teardown, closeInterface, ifnet_release"
      - "OR: stop → deregisterNetworkInterface → full queue/link teardown"
      - "OR: free → defensive deregisterNetworkInterface → destroy NIF context"


