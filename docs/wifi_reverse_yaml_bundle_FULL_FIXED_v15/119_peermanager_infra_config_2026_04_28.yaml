local_before_cr_179:
  files:
    - "include/Airport/IO80211PeerManager.h"
  mismatch: "header declared the membership (CR-176), lookup, and data-path control (CR-178) helpers but no infra BSSID/SSID/channel/RSSI helpers"
  consequence: "any future caller wanting to read or program the cached infra association state would have to add per-callsite extern declarations with mangled signatures"

local_fix_cr_179:
  supersedes: "CR-178"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211PeerManager.h"
  changes:
    - "extend `class IO80211PeerManager` with thirteen non-virtual public method declarations covering the infra config cluster"
    - "declare BSSID accessor `ether_addr *getInfraBssid(void)`"
    - "declare SSID accessors/mutators (`getInfraSsidLen`, `setInfraSsidLen`, `getInfraSsidBytes`, `setInfraSsidBytes`)"
    - "declare TX-state mutator `setInfraTxState(bool)`"
    - "declare channel accessors/mutators (`setInfraChannel`, `copyInfraChannel`, `resetInfraChannel`, `setInfraChannelInfo`, `setInfraChannelFlags`)"
    - "declare RSSI accessor/mutator (`getInfraRSSI`, `setInfraRSSI`)"
    - "forward-declare `struct apple80211_channel` and `struct ether_addr`"
    - "anchor each declaration to its BootKC address in the header preamble"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    sha256_post: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    uuid_pre: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    uuid_post: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    regdiag_sha256: "6915020cdd70a07c4b77b2946dd5605bc378fc0677119506ae691a7968f01fad"
    note: "no live code references the new declarations yet, so generated binary is bit-identical to CR-178"
  non_claims:
    - "does not synthesize AppleBCMWLANPCIeSkywalkPacket"
    - "does not write packet+0x78"
    - "does not change packet allocation, queueing, input, or output behavior"
    - "does not force EAPOL TX, key install, RSN, DHCP, link, or data success"
    - "does not add retry, replay, delay, poll loop, packet synthesis, or deauth masking"
    - "does not call any of the thirteen new peer-manager methods from any local code path"
    - "does not declare IO80211PeerManager with any base class or data layout"
    - "does not include kernel-internal types whose definitions are not yet recovered"

