version: 1
topic: "Remaining gaps closed — event table, CONNECT_COMPLETE, setPowerState, stop, BSD naming"
status: all_gaps_closed
purpose: >-
  Closes every remaining gap from V10 MANIFEST: the full 246-entry event
  code→name string table, the 164-byte CONNECT_COMPLETE struct, setPowerState
  and stop bodies for IO80211Family, and the getBSDNamePrefix / getBSDUnitNumber
  implementations. All data extracted from BootKernelExtensions.kc (macOS 26.3,
  25D125, x86_64) and Ghidra decompilation of IO80211Family and AppleBCMWLAN.

source:
  kernel: "macOS 26.3 (25D125), x86_64"
  binary: "BootKernelExtensions.kc"
  decompilation: "ghidra_output/ — IO80211Family_decompiled.c, AppleBCMWLAN_Core_decompiled.c"
  disassembly: "capstone disassembly of sendConnectComplete at 0xffffff800157d472"

# ═══════════════════════════════════════════════════════════════
# 1. COMPLETE EVENT CODE→NAME STRING TABLE (246 entries)
# ═══════════════════════════════════════════════════════════════

event_string_table:
  location: "DAT_ffffff80023fe7c0 — IO80211Family __DATA segment"
  format: "Array of 246 char* pointers, each 8 bytes. Index = event code."
  accessor_function: "_convertApple80211EventToString @ 0xffffff8002306000"
  accessor_logic: >-
    if (code >= 0xf6) return "unknown APPLE80211_M_";
    else return table[code];
  extraction_method: >-
    Chained fixup pointers decoded from KC binary:
    file_offset = raw_pointer & 0xFFFFFFFFFF.
    Strings reside in IO80211Family cstring section near fileoff 0x022c33xx.

  entries:
    - { code: 0x00, name: "(NULL)" }
    - { code: 0x01, name: "APPLE80211_M_POWER_CHANGED" }
