# 7. getBSDNamePrefix / getBSDUnitNumber IMPLEMENTATIONS
# ═══════════════════════════════════════════════════════════════

getBSDNamePrefix_implementations:
  notes: >-
    getBSDNamePrefix() returns the BSD interface name prefix (e.g. "en", "awdl").
    The base IOSkywalkNetworkInterface returns NULL; IOSkywalkEthernetInterface
    returns "en". Specific Apple WiFi subclasses override for their interface type.
    These were found in AppleBCMWLAN decompilation; the IO80211Family base class
    implementations are thin wrappers.

  base_class:
    class: "IOSkywalkNetworkInterface"
    behavior: "Returns NULL (must be overridden)"
    source: "Documented in 88_ioskywalkfamily_internals.yaml"

  ethernet_base:
    class: "IOSkywalkEthernetInterface"
    behavior: "Returns 'en'"
    string_location: "DAT_0xa5c8dc in IOSkywalkFamily cstring (fileoff 0x0295c8dc in BootKC)"

  concrete_overrides:
    - class: "AppleBCMWLANLowLatencyInterface"
      addr: "0xffffff8001563dc6"
      prefix: "llw"
      string_location: "DAT_ffffff80016fe297 (fileoff 0x015fe297)"
      notes: "Low-latency WiFi interface for real-time applications"

    - class: "AppleBCMWLANProximityInterface"
      addr: "0xffffff8001699424"
      prefix: "awdl"
      string_location: "DAT_ffffff800171a5ed (fileoff 0x0161a5ed)"
      notes: "AWDL/AirDrop proximity discovery interface"

    - class: "AppleBCMWLANNANInterface"
      addr: "0xffffff80016ae71c"
      prefix: "nan"
      string_location: "DAT_ffffff800170a8a2 (fileoff 0x0160a8a2)"
      notes: "WiFi Aware / Neighbor Awareness Networking interface"

    - class: "AppleBCMWLANNANDataInterface"
      addr: "0xffffff80016c8c70"
      prefix: "p2p"
      string_location: "DAT_ffffff800171a55c"
      notes: "NAN data path interface (uses p2p prefix, not nan)"

  io80211_family_consolidated_prefixes:
    notes: >-
      IO80211Family itself has a consolidated string table at fileoff 0x02279e5a:
      "en\0awdl\0ap\0nan\0llw\0" — all prefixes adjacent in one cstring block.
    entries:
      - { prefix: "en",   interface: "IO80211InfraInterface (primary STA)", fileoff: "0x02279e5a" }
      - { prefix: "awdl", interface: "IO80211AWDLPeerManager", fileoff: "0x02279e5d" }
      - { prefix: "ap",   interface: "IO80211APSTAInterface (SoftAP/hotspot)", fileoff: "0x02279e62" }
      - { prefix: "nan",  interface: "IO80211NANInterface", fileoff: "0x02279e65" }
      - { prefix: "llw",  interface: "IO80211LowLatencyInterface", fileoff: "0x02279e6c" }

getBSDUnitNumber_implementations:
  notes: >-
    getBSDUnitNumber() returns the interface unit number suffix (e.g. en0=0, en1=1).
    The base IOSkywalkNetworkInterface returns 0 or -1 (Ghidra gap in V10).
    The only concrete override found is for APSTA.

  base_class:
    class: "IOSkywalkNetworkInterface"
    addr: "0xa38914 (in IOSkywalkFamily)"
    behavior: "Returns 0 (inferred — Ghidra decompilation gap)"

  concrete_overrides:
    - class: "AppleBCMWLANIO80211APSTAInterface"
      addr: "0xffffff8001686a6e"
      return_value: 1
      notes: >-
        Hardcoded return 1. SoftAP always gets unit 1 (en1 on systems with
        both STA and AP interfaces). Primary STA gets unit 0 from the base class.

  itlwm_note: >-
    For itlwm, the base getBSDUnitNumber returning 0 is correct — itlwm is the
    primary STA interface (en0 or en1 depending on system). The unit number can
    also be overridden by IOKit matching via IONetworkInterfaceUnitNumber property.
