      - { code: 0x02, name: "SSID_CHANGED", when: "after association" }
      - { code: 0x03, name: "BSSID_CHANGED", when: "after association/roam" }
      - { code: 0x04, name: "LINK_CHANGED", when: "link up/down transitions" }
      - { code: 0x09, name: "ASSOC_DONE", when: "association complete" }
      - { code: 0x0A, name: "SCAN_DONE", when: "scan complete" }
      - { code: 0x0B, name: "COUNTRY_CODE_CHANGED", when: "regulatory domain set" }
      - { code: 0x0F, name: "SCAN_CACHE_UPDATED", when: "BSS list updated" }
      - { code: 0xD5, name: "WCL_CONNECT_COMPLETE_EVENT", when: "full connection established (26.x WCL path)" }

# ═══════════════════════════════════════════════════════════════
# 2. CONNECT_COMPLETE FULL 164-BYTE STRUCT
# ═══════════════════════════════════════════════════════════════

connect_complete_event:
  event_code: "0xD5"
  event_name: "APPLE80211_M_WCL_CONNECT_COMPLETE_EVENT"
  total_size: "0xa4 (164 bytes)"
  source_function: "AppleBCMWLANJoinAdapter::sendConnectComplete() @ 0xffffff800157d472"
  decompiler_issue: >-
    Ghidra falsely classified FUN_ffffff8000101100 (bzero) as non-returning,
    truncating the decompiler output after the memset call. The disassembly
    below shows the full function body, which continues to populate the buffer
    and call postMessage.

  disassembly_summary: |
    push rbp; mov rbp,rsp; push r15/r14/r12/rbx; sub rsp,0xb0
    ; stack canary setup
    mov r15, [rdi+0x10]            ; r15 = ivars
    ; guard: ivars[1]&1 && !(ivars[4]&1) && ivars->status != 0xFFFF
    test byte [r15+1],1 / je cleanup
    test byte [r15+4],1 / jne cleanup
    movzx r12d, word [r15+0x280] / cmp r12w,-1 / je cleanup

    lea r14,[rbp-0xc8]             ; buf = body (0xa0 bytes)
    call bzero(r14, 0xa0)          ; zero body

    mov word [r14-4], r12w         ; struct+0x00 = status
    mov ax, [r15+0x282]
    mov word [r14-2], ax           ; struct+0x02 = reason_flags

    lea rax,[r15+0x2ac]            ; source = ivars BSS array base
    mov ecx, 0x10                  ; dest offset counter
    LOOP:
      mov [rbp+rcx-0xd8], [rax-0x20]  ; entry.field_a (4B)
      mov [rbp+rcx-0xd4], [rax-0x1c]  ; entry.field_b (2B)
      mov [rbp+rcx-0xd0], [rax-4]     ; entry.field_c (4B)
      mov [rbp+rcx-0xcc], [rax]       ; entry.field_d (4B)
      add rcx,0x10 / add rax,0x44
      cmp rcx,0xb0 / jne LOOP

    ; call postMessage(core, interface, 0xD5, &struct, 0xa4, 1)
    mov rdi,[r15+0x38]
    mov rsi,[[rdi+0x128]+0x2c20]   ; primary STA interface
    lea rcx,[rbp-0xcc]             ; buffer base
    mov r8d,0xa4 / mov edx,0xd5 / mov r9d,1
    call IO80211Controller::postMessage

    mov byte [rbx+0x10+4], 1      ; ivars->connect_complete_sent = true
    mov byte [rbx+0x10+1], 0      ; ivars->join_in_progress = false

  struct_layout:
    notes: >-
      Buffer lives on stack at rbp-0xcc, size 0xa4 (164 bytes).
      First 4 bytes are the header (status+flags), then 0xa0 bytes of
      body containing 10 BSS entries of 16 bytes each.
      Body is zeroed before population; only entry[0] is meaningful
      for a simple STA connection (others zero).
    fields:
      - offset: "0x00"
        size: 2
        type: uint16
        name: status
        source: "ivars+0x280"
        notes: "0=success, 0xFFFF=failed, other=reason code"
      - offset: "0x02"
        size: 2
        type: uint16
        name: reason_flags
        source: "ivars+0x282"
        notes: "0x3f0 on ICV error path"
      - offset: "0x04"
        size: 160
        type: "bss_entry[10]"
        name: bss_entries
        notes: "Array of 10 BSS info entries, 16 bytes each. Entry 0 = connected BSS."

    bss_entry_layout:
      size: 16
      stride_in_ivars: "0x44 (68 bytes per BSS in JoinAdapter ivars)"
      ivars_base: "ivars+0x28c (entry 0)"
      fields:
        - offset: "0x00"
          size: 4
          type: uint32
          name: field_a
          source: "ivars+0x28c+i*0x44"
          notes: >-
            First 4 bytes of BSS data block. handleSupplicantEvent copies
            BSSID (6 bytes) starting at ivars+0x28c, so low 4 bytes overlap
            BSSID bytes [0..3].
        - offset: "0x04"
          size: 2
          type: uint16
          name: field_b
          source: "ivars+0x290+i*0x44"
          notes: "BSSID bytes [4..5] or channel spec (depends on layout)"
        - offset: "0x06"
          size: 2
          type: uint16
          name: padding
          notes: "Zeroed by memset, not written by loop"
        - offset: "0x08"
          size: 4
          type: uint32
          name: field_c
          source: "ivars+0x2a8+i*0x44"
          notes: "Likely RSSI or signal quality metric"
        - offset: "0x0C"
          size: 4
          type: uint32
          name: field_d
          source: "ivars+0x2ac+i*0x44"
          notes: "Likely noise floor or data rate"

  itlwm_implementation_note: >-
    For itlwm, construct a 164-byte buffer: set status=0 (success),
    reason_flags=0, populate entry[0] with BSSID and signal data
    from the connected BSS, zero the remaining 9 entries, then call
    postMessage(iface, 0xD5, buffer, 0xa4, true).

# ═══════════════════════════════════════════════════════════════
# 3. IO80211SkywalkInterface::setPowerState
# ═══════════════════════════════════════════════════════════════

IO80211SkywalkInterface_setPowerState:
  addr: "0xffffff8002277434"
  symbol: "__ZN23IO80211SkywalkInterface13setPowerStateEmP9IOService"
  signature: "IOReturn setPowerState(unsigned long powerState, IOService* whatDevice)"
  decompiled_body: |
    IOReturn IO80211SkywalkInterface::setPowerState(unsigned long powerState, IOService*) {
        long expansionData = this->mExpansionData;  // self+0x120
        long glueCtx = *(long *)(expansionData + 0x50);

        if (glueCtx != 0) {
            if (powerState == 1) {
                // WAKE path
                IO80211MacAddressAgent::wake(/* from glueCtx */);
            } else {
                // SLEEP path — cancel timers on peer managers
                long* peerMgr = *(long**)(*(long*)(glueCtx+0x10) + 0x10);
                if (peerMgr != NULL) {
                    peerMgr->cancelAllTimers();  // vtable+0x218
                }
            }
        }

        // Record power state: 0=sleep, 2=awake
        *(uint*)(expansionData + 0xe0) = (powerState == 1) ? 2 : 0;

        // Log the transition
        uint unitNumber = this->getUnitNumber();
        logDiag(this, 0x800000000000000,
                "IO80211SkywalkInterface::setPowerState[%u] curState=%d newState=%lu newInternal=%d",
                unitNumber,
                *(uint*)(expansionData + 0x58),  // current state
                powerState,
                *(uint*)(expansionData + 0xe0));  // new internal state

        // Chain to super (IOSkywalkNetworkInterface::setPowerState)
        super::setPowerState(powerState, whatDevice);

        return kIOPMAckImplied;  // return 0
    }
  notes: >-
    Key detail: power state is stored at expansionData+0xe0 as 0 (sleep)
    or 2 (awake). On wake, IO80211MacAddressAgent::wake() restores the
    MAC address configuration. On sleep, peer manager timers are cancelled.

# ═══════════════════════════════════════════════════════════════
# 4. IO80211InfraInterface::setPowerState
# ═══════════════════════════════════════════════════════════════

IO80211InfraInterface_setPowerState:
  addr: "0xffffff80022e673c"
  symbol: "__ZN21IO80211InfraInterface13setPowerStateEmP9IOService"
  signature: "IOReturn setPowerState(unsigned long powerState, IOService* whatDevice)"
  decompiled_body: |
    IOReturn IO80211InfraInterface::setPowerState(unsigned long powerState, IOService* whatDevice) {
        // Step 1: Call base (IO80211SkywalkInterface::setPowerState)
        IOReturn result = IO80211SkywalkInterface::setPowerState(powerState, whatDevice);

        // Step 2: Build system state struct
        apple80211_system_state state;
        state.power_state = (powerState == 1) ? 2 : 1;  // 2=awake, 1=sleep
        state.flags = 0;

        // Step 3: Push state to WCL
        bool isSkywalkMode = (*(long**)(this->mExpansionData + 0x38))->isSkywalkMode();
        if (!isSkywalkMode) {
            // Legacy path
            IOCommandGate::runAction(this->mExpansionData + 0x38, ...);
        } else {
            // Skywalk path — dispatch via WCL bulletin board
            IO80211InfraInterface::setWCLSystemState(this, &state);
        }

        return result;
    }
  notes: >-
    This wraps the Skywalk base setPowerState and adds WCL system state
    notification. On wake (state=2), it also sends RNG_EVENT_WAKE to the
    RNG agent. On sleep (state=1), it cancels all debounce timers and sends
    RNG_EVENT_SLEEP. The WCL bulletin board message code for system state
    is 0x802869c8 with subtype 0x206.

  setWCLSystemState_details:
    addr: "0xffffff80022e6860"
    behavior: |
      On wake (state.power_state == 2):
        - Restore lowLatency interface enable state
        - Wake proximity interface peer managers
        - Send RNG_EVENT_WAKE to RNG agent (if registered)
      On sleep (state.power_state == 1):
        - Cancel proximity peer timers
        - Suspend lowLatency interface
        - Send RNG_EVENT_SLEEP to RNG agent
        - Cancel IO80211InfraInterface debounce timer

# ═══════════════════════════════════════════════════════════════
# 5. IO80211InfraInterface::stop(IOService*)
# ═══════════════════════════════════════════════════════════════

IO80211InfraInterface_stop:
  addr: "0xffffff80022de4d8"
  symbol: "__ZN21IO80211InfraInterface4stopEP9IOService"
  decompiled_body: |
    void IO80211InfraInterface::stop(IOService* provider) {
        // Step 1: call base
        IO80211SkywalkInterface::stop(provider);

        long* infraData = *(long**)(this + 0x128);  // InfraInterface expansion data

        // Step 2: stop WCL beacon mute mitigation
        if (infraData[0x2c] != 0) {
            infraData[0x2c]->cancelPendingTimers();   // vtable+0x90
        }

        // Step 3: stop scan manager
        if (*infraData != 0) {
            IO80211ScanManager::stop();
        }

        // Step 4: stop RNG agent
        long rngCtx = infraData[0x2f];
        if (rngCtx != 0) {
            long* rngImpl = *(long**)(*(long*)(rngCtx+0x10) + 0x10);
            if (rngImpl != NULL) {
                rngImpl->cancelAllTimers();  // vtable+0x218
                rngImpl->release();          // vtable+0x158
            }
        }

        // Step 5: stop deauth/disassoc monitor
        if (infraData[0x26] != 0) {
            *(uint8_t*)(infraData + 0x28) = 0;  // clear active flag
            infraData[0x26]->cancelAllTimers();
        }

        // Step 6: release AVC advisory
        if (infraData[0x2d] != 0) {
            infraData[0x2d]->release();
        }
        infraData[0x2d] = 0;
    }
  notes: >-
    stop() tears down in reverse order: WCL mitigation → scan manager →
    RNG agent → deauth monitor → AVC advisory. The base
    IO80211SkywalkInterface::stop handles glue teardown and Skywalk
    deregistration.

# ═══════════════════════════════════════════════════════════════
# 6. IO80211SkywalkInterface::stop(IOService*)
# ═══════════════════════════════════════════════════════════════

IO80211SkywalkInterface_stop:
  addr: "0xffffff800227750e"
  symbol: "__ZN23IO80211SkywalkInterface4stopEP9IOService"
  decompiled_body: |
    void IO80211SkywalkInterface::stop(IOService* provider) {
        // Log entry
        log("IO80211SkywalkInterface::stop[%u] ::stop( %p ) this[%p]",
            provider->getRegistryEntryID(), provider, this);

        // Step 1: chain to superclass stop (IOSkywalkNetworkInterface)
        super::stop(provider);  // vtable+0x798

        long expansionData = this->mExpansionData;  // self[0x24] = self+0x120

        // Step 2: release NAN interface
        if (*(long*)(expansionData + 0x80) != NULL) {
            *(long*)(expansionData+0x80)->stop();    // vtable+0x870
            *(long*)(expansionData+0x80)->release();  // vtable+0x28
        }
        *(long*)(expansionData + 0x80) = 0;

        // Step 3: release proximity interface
        if (*(long*)(expansionData + 0x78) != NULL) {
            *(long*)(expansionData+0x78)->release();
        }
        *(long*)(expansionData + 0x78) = 0;

        // Step 4: release lowLatency interface
        if (*(long*)(expansionData + 0x50) != NULL) {
            *(long*)(expansionData+0x50)->release();
        }
        *(long*)(expansionData + 0x50) = 0;

        // Step 5: if not in compat mode (type != 2), tear down pools/queues
        if (*(int*)(expansionData + 0x58) != 2) {
            long* core = *(long**)(expansionData + 0x28);  // IO80211Controller
            long coreExpansion = core[3];

            // Release TX pool
            long* txPool = *(long**)(coreExpansion + 0x528);
            if (txPool) { txPool->release(); }

            // Release RX pool
            long* rxPool = *(long**)(coreExpansion + 0x530);
            if (rxPool) { rxPool->release(); }

            // Tear down core association
            core->disassociate();  // vtable+0x290
            if (*(long**)(expansionData + 0x28) != NULL) {
                *(long**)(expansionData+0x28)->release();
            }
        }
        *(long*)(expansionData + 0x28) = 0;

        // Step 6: stop IO80211Glue
        if (*(long*)(expansionData + 0xd8) != 0) {
            IO80211Glue::stop();
        }

        // Step 7: chain to IOSkywalkNetworkInterface::stop (again? dedup)
        IOSkywalkNetworkInterface::stop();

        // Log completion with retain counts
        log("IO80211SkywalkInterface::stop[%s] RC=<%d> core RC=<%d>", ...);
    }
  notes: >-
    Critical: the stop path releases TX/RX pools at core expansion+0x528/0x530,
    releases the controller back-reference at expansion+0x28, and stops
    IO80211Glue. For itlwm, this means pools and queues MUST survive until
    stop() is called — do not release them earlier.

