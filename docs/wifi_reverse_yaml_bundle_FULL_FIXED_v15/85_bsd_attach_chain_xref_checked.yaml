  methods_needed:
    - name: registerNetworkInterfaceWithLogicalLink
      reason: "Core of logical link setup — internal steps unknown"
    - name: deferBSDAttach
      reason: "Exact trigger mechanism for BSDClient matching"
    - name: prepareBSDInterface_base
      reason: "Base BPF attachment logic"
    - name: finalizeBSDInterface
      reason: "BSD registration completion steps"
    - name: setBSDName
      reason: "Name storage mechanism"
    - name: getBSDUnitNumber_base
      reason: "Unit number assignment algorithm"
    - name: deregisterLogicalLink
      reason: "Teardown steps — pool/queue/ifnet ordering"
    - name: registerEthernetInterface
      reason: "Non-virtual wrapper that creates LogicalLink"
    - name: IOSkywalkNetworkBSDClient_start
