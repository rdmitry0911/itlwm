topic: BSD/Skywalk attach call chain — xref-level extraction
status: extraction_pass_complete
purpose: >-
  Exact caller sites, vtable slot dispatch, and sequencing for the
  IOSkywalkNetworkInterface BSD/Skywalk registration path.
  Closes the #1 remaining gap identified in 65_remaining_gap_honest_cut.yaml.

source:
  kernel: "macOS 26.3 (25D125), x86_64"
  decompilation: "ghidra_output/IO80211_vtables_BootKC_26.2_25C56.txt + BootKC disasm"
  yaml_cross_ref: "20_skywalk_interface_contracts.yaml (vtable anchors)"

# ═══════════════════════════════════════════════════════════════
# VTABLE SLOT REFERENCE (quick-lookup)
# ═══════════════════════════════════════════════════════════════

vtable_slots:
  - {slot: 284, offset: "0x8D0", name: registerNetworkInterfaceWithLogicalLink}
  - {slot: 285, offset: "0x8D8", name: deregisterLogicalLink}
  - {slot: 286, offset: "0x8E0", name: initBSDInterfaceParameters, notes: "pure virtual in base"}
  - {slot: 287, offset: "0x8E8", name: prepareBSDInterface}
  - {slot: 288, offset: "0x8F0", name: finalizeBSDInterface}
  - {slot: 289, offset: "0x8F8", name: getBSDInterface}
