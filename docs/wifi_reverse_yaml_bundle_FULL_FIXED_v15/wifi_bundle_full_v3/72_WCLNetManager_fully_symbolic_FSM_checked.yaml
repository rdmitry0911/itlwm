behavioral_notes:
  happy_path: LINK_DOWN -> WAITING_FOR_CONNECT_COMPLETE (LINK_UP/firstLinkUp) -> WAITING_FOR_IP (CONNECT_COMPLETE/connectComplete) -> LINK_UP (IPV4_STATUS/ipStatusInWaitForIp). IP acquisition is the gate between WAITING_FOR_IP and LINK_UP.
  deauth_drain: DEAUTH is a drain state. Only LINK_DOWN_COMPLETE exits it (to LINK_DOWN). SLEEP from DEAUTH goes to SLEEP_DEAUTH. All other events stay or ignore.
  sleep_wake: SLEEP preserves link state. WAKE from SLEEP -> LINK_UP (wake). WAKE from SLEEP_DEAUTH -> LINK_UP (wakeLeave, initiates leave after wake). LINK_UP events during SLEEP use linkUpInSleep (deferred processing).
  driver_reset: DRIVER_RESET -> DEAUTH via forceLinkDown from all active states. From DEAUTH and SLEEP_DEAUTH it re-triggers forceLinkDown (stays).
