validate_fsm_config_algorithm:
  - "load runtime from self+0x10"
  - "load descriptor from runtime+0x08"
  - "panic if descriptor is null while processing"
  - "descriptor_valid := transition_matrix_ptr != 0 && action_table_ptr != 0 && third_required_vector != 0"
  - "for each state in state_count"
  - "for each event in event_count"
  - "read 2-byte transition cell from transition_matrix"
  - "cell[0] -> next_state"
  - "cell[1] -> action_id"
  - "check next_state < state_count unless 0xff sentinel"
  - "check action_id < action_count"
  - "check action_table[action_id].callback != NULL"

process_event_implications:
  - "transition cell format is packed and stable enough for offline decoder generation"
  - "action table entries are 0x10 bytes apart"
  - "symbolic overlay is feasible once descriptor rodata origin is known"
  - "state/event string vectors almost certainly exist because trace path formats names, not just numbers"

