behavioral_notes:
  hidden_state: DEEP_SLEEP (state 4) is not in the string name table but exists in the transition matrix. It represents deep system sleep where LINK_UP is ignored, ASR frames are freed (not sent), and only WAKE_OPEN/WAKE_SECURE can exit it.
  external_entry: LINK_DOWN is an all-unhandledEvent state. Entry from LINK_DOWN to ASSOCIATED happens externally via WCL11axManager::linkStateUpdate bulletin board callback, not through the FSM matrix.
  ax_features: '802.11ax (Wi-Fi 6) specific: ULOFDMA state changes, ASR (Adaptive Spatial Reuse) frame sending varies by state (sendAsrConnected vs sendAsrSleep vs freeAsrFrame in deep sleep).'
  wake_variants: WAKE_OPEN -> CONNECTED_SECURE (full wake), WAKE_SECURE -> SLEEP (partial wake, maintain security context). Both only from DEEP_SLEEP.
