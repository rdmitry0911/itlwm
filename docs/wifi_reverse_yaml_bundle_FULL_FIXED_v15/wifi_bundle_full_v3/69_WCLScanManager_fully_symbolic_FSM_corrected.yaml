consistency_notes:
  - The original extraction summary had a likely typo for the overflow event-string offsets: 0x2341431-0x2341490. This corrected copy uses 0x2241431-0x2241490, matching the verified __cstring entries below.
  - The +0x1a0 block is not purely a state-name vector; it contains 4 state-name pointers followed by 6 event-name pointers. The +0x1f0 block holds the remaining 4 event-name pointers.
  - Symbolic self-loops are rendered mostly as =SELF=. A few rows keep the explicit state name where that was already written in the source file; this is semantically equivalent.
  - SCAN_COMPLETE transitions to IDLE in all non-HALTED states; in HALTED it remains HALTED while still invoking handleScanComplete.
