context_layout:
  +0x000_to_0x097:
    description: "WCLFsmManager bulletin board callback table (7 entries @ 0x18 stride)"
  +0x098_to_0x09f:
    description: "padding / reserved (zeros, except +0x97 = 0x03)"
  +0x0a0_to_0x0ef:
    description: "transition matrix (80 bytes = 4 states x 10 events x 2 bytes/cell)"
  +0x0f0_to_0x19f:
    description: "action table (11 entries x 0x10 bytes = 176 bytes)"
    note: "Itanium ABI member function pointers {func_ptr:8, this_adj:8}"
  +0x1a0_to_0x1ef:
    description: "primary name vector block (10 x 8-byte ptrs, chained-fixup encoded targets)"
    note: "Pointers 0-3 name states 0-3; pointers 4-9 hold the first 6 event-name pointers"
  +0x1f0_to_0x20f:
    description: "event name vector overflow block (4 additional event-name ptrs, raw kernel VAs)"
    note: "Completes the 10-event naming set together with the tail of the +0x1a0 block"
  +0x210:
    description: "FSM name pointer -> 'SCAN_MANAGER'"

# Address offset note:
# KDK symbols (from /srv/project/ghidra_output/kdk_symbols.txt) have addresses
# that differ from the BootKC chained fixup targets by a constant offset.
# Example: KDK ignore=0x02120a70, KC target=0x02020a74 (delta=0x0FFFFC).
# The deltas between handlers are identical in both, confirming the mapping.
kdk_to_kc_note: >-
  The KDK and BootKC addresses differ by ~0x100000 (likely different KC base
  or build variant). Handler identification was verified by matching inter-function
  deltas, which are identical in both address spaces.

