version: 1
topic: WCLScanManager fully symbolic FSM
status: complete
source: BootKernelExtensions.kc 26.3 (25D125) via Ghidra headless + chained fixup decode
extraction_method:
  - gfsmSCAN_MANAGERcontext at VA 0xffffff8002401e10
  - transition matrix at context+0xa0 (80 bytes, 4 states x 10 events x 2 bytes/cell)
  - action table at context+0xf0 (11 entries x 0x10 bytes, Itanium ABI member func ptrs)
  - state name vector at context+0x1a0 (10 ptrs, file offsets 0x2241311-0x2241417)
  - event name vector overflow at context+0x1f0 (4 ptrs covering file offsets 0x2241431-0x2241490, raw kernel VAs after fixup decode)
  - FSM name at context+0x210 -> "SCAN_MANAGER" (file offset 0x22414b3)

