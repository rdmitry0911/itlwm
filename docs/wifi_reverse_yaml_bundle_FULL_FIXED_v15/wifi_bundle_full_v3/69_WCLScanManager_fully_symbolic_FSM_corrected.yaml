# Transition matrix: cell = [next_state, action_id]
# 0xFF next_state = stay in current state (symbolically rendered below as =SELF= or, in a few rows, as the explicit current-state name)
transition_matrix:
  IDLE:
    SCAN_REQ:         { next: IN_PROGRESS, action: handleScanRequest }
    SCAN_REQ_FAILED:  { next: =SELF=,      action: ignore }
    SCAN_ABORT_REQ:   { next: =SELF=,      action: ignore }
    SCAN_COMPLETE:    { next: IDLE,         action: handleScanComplete }
    HALT:             { next: HALTED,       action: ignore }
    RESUME:           { next: =SELF=,      action: ignore }
    TIMEOUT:          { next: IDLE,         action: handleTimeoutAssert }
    DRIVER_RESET:     { next: HALTED,       action: ignore }
    SYSTEM_POWER_OFF: { next: HALTED,       action: ignore }
    SYSTEM_POWER_ON:  { next: =SELF=,      action: ignore }

  IN_PROGRESS:
    SCAN_REQ:         { next: IN_PROGRESS, action: handleScanRequest }
    SCAN_REQ_FAILED:  { next: IDLE,         action: handleScanRequestFailed }
    SCAN_ABORT_REQ:   { next: ABORTED,      action: handleAbortRequest }
    SCAN_COMPLETE:    { next: IDLE,         action: handleScanComplete }
    HALT:             { next: HALTED,       action: handleAbortRequest }
    RESUME:           { next: =SELF=,      action: ignore }
    TIMEOUT:          { next: IN_PROGRESS, action: handleTimeout }
    DRIVER_RESET:     { next: HALTED,       action: handleDriverReset }
    SYSTEM_POWER_OFF: { next: HALTED,       action: handleScanAbort }
    SYSTEM_POWER_ON:  { next: =SELF=,      action: ignore }

  HALTED:
    SCAN_REQ:         { next: =SELF=,      action: ignore }
    SCAN_REQ_FAILED:  { next: =SELF=,      action: ignore }
    SCAN_ABORT_REQ:   { next: =SELF=,      action: ignore }
    SCAN_COMPLETE:    { next: HALTED,       action: handleScanComplete }
    HALT:             { next: =SELF=,      action: ignore }
    RESUME:           { next: IDLE,         action: handleResume }
    TIMEOUT:          { next: HALTED,       action: handleTimeoutAbort }
    DRIVER_RESET:     { next: =SELF=,      action: ignore }
    SYSTEM_POWER_OFF: { next: =SELF=,      action: ignore }
    SYSTEM_POWER_ON:  { next: IDLE,         action: handleResume }

  ABORTED:
    SCAN_REQ:         { next: =SELF=,      action: ignore }
    SCAN_REQ_FAILED:  { next: =SELF=,      action: ignore }
    SCAN_ABORT_REQ:   { next: =SELF=,      action: ignore }
    SCAN_COMPLETE:    { next: IDLE,         action: handleScanComplete }
    HALT:             { next: HALTED,       action: ignore }
    RESUME:           { next: =SELF=,      action: ignore }
    TIMEOUT:          { next: ABORTED,      action: handleTimeoutAbort }
    DRIVER_RESET:     { next: =SELF=,      action: ignore }
    SYSTEM_POWER_OFF: { next: =SELF=,      action: ignore }
    SYSTEM_POWER_ON:  { next: =SELF=,      action: ignore }

# Raw transition matrix bytes (for verification)
# Address: gfsmSCAN_MANAGERcontext + 0xa0
# Format: [next_state:u8, action_id:u8] per cell, row-major, stride = event_count * 2
raw_matrix_hex: |
  01 00 ff 04 ff 04 00 03  02 04 ff 04 00 08 02 04
  02 04 ff 04 01 00 00 01  03 02 00 03 02 02 ff 04
  01 06 02 09 02 0a ff 04  ff 04 ff 04 ff 04 02 03
  ff 04 00 05 02 07 ff 04  ff 04 00 05 ff 04 ff 04
  ff 04 00 03 02 04 ff 04  03 07 ff 04 ff 04 ff 04

