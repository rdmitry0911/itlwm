kdk_to_kc_note: KDK-to-BootKC delta is +0x2e8 (BootKC = KDK + 0x2e8), consistent across all 17 action handlers and 20 bulletin board callbacks (37 verified matches). The inter-function deltas are identical in both address spaces.
behavioral_notes:
  join_flow: 'Normal join path: IDLE -> IN_PROGRESS (JOIN_REQ) -> ASSOC_DONE (JOIN_ASSOC_COMPLETE) -> CONNECT_COMPLETE (JOIN_CONNECT_COMPLETE) -> IDLE (JOIN_COMPLETE). This is the 4-step join lifecycle.'
  candidate_retry: From IN_PROGRESS and CONNECT_COMPLETE, TRY_NEXT_CANDIDATE triggers handleSendCandidateToDriver, returning to/staying in IN_PROGRESS. TRY_NEXT_CANDIDATE_DELAYED triggers handleWaitForAllowIndication. These enable BSS candidate iteration during join.
  abort_flow: JOIN_ABORT_REQ from any active state (IN_PROGRESS, ASSOC_DONE, CONNECT_COMPLETE) -> ABORTED via handleJoinAbortReq. ABORTED waits for JOIN_ABORT_COMPLETE -> IDLE via handleJoinAbortComplete. HALTED also handles JOIN_ABORT_COMPLETE (stays HALTED).
  halt_pattern: HALT/DRIVER_RESET/SYSTEM_POWER_OFF all transition active states to HALTED. Active states use handleJoinAbort or handleDriverReset; IDLE uses ignore. HALTED exits via RESUME or SYSTEM_POWER_ON -> IDLE via handleResume.
  timeout_pattern: TIMEOUT in active states (IN_PROGRESS, ASSOC_DONE, CONNECT_COMPLETE) stays in current state via handleTimeout. IDLE/TIMEOUT -> handleTimeoutAssert (defensive). HALTED/ABORTED/TIMEOUT -> handleTimeoutAbort (graceful cancel).
  scan_update: JOIN_SCAN_UPDATE is only handled in IN_PROGRESS state via handleJoinScanUpdate. All other states ignore it.
