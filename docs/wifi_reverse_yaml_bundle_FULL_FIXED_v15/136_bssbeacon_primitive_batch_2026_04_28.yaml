justification: REFERENCE_ALIGNMENT_FIX
supersedes: CR-198
batch_size: 102
notes: |
  IO80211BSSBeacon previously had no local header. CR-199
  introduces include/Airport/IO80211BSSBeacon.h as a
  standalone-stub class declaration carrying primitive-only direct-
  call exports. The class is declared with no base class so the
  local kext does not subclass, allocate, or take sizeof of it.
  Helpers whose signatures reference kernel-internal struct/enum
  types are deferred until those types are recovered. In particular,
  CR-199 defers the five exports whose return types are unrecovered
  kernel-internal pointers (getLogger() const, getSSID() const,
  getOWETransSSID() const, getRnRContext() const, getQueueChain())
  to avoid void*-style type erasure inside a 1:1 reference-alignment
  patch.

