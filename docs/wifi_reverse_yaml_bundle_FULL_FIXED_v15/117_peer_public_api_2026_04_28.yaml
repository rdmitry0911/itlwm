local_before_cr_177:
  files:
    - "include/Airport/*"
  mismatch: "no canonical IO80211Peer header in the local include tree; class only forward-declared in IO80211SkywalkInterface.h"
  consequence: "any future caller wanting to invoke peer factory/init/accessors would have to add per-callsite extern declarations with mangled signatures"

local_fix_cr_177:
  supersedes: "CR-176"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211Peer.h"
  changes:
    - "create new header `include/Airport/IO80211Peer.h`"
    - "declare `class IO80211Peer` as opaque (no base class, no data, no vtable)"
    - "declare static `IO80211Peer *withAddressAndManager(unsigned char const *, IO80211PeerManager *)`"
    - "declare `bool init(void)`"
    - "declare `ether_addr *getMacAddress(void)`"
    - "declare `void setMacAddress(ether_addr *)`"
    - "declare `IO80211PeerManager *getManager(void)`"
    - "declare `unsigned int getGeneration(void)`"
    - "forward-declare `class IO80211PeerManager` and `struct ether_addr`"
    - "anchor each declaration to its BootKC address in the header preamble"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    sha256_post: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    uuid_pre: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    uuid_post: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    regdiag_sha256: "6915020cdd70a07c4b77b2946dd5605bc378fc0677119506ae691a7968f01fad"
    note: "no live code references the new declarations yet, so generated binary is bit-identical to CR-176"
  non_claims:
    - "does not synthesize AppleBCMWLANPCIeSkywalkPacket"
    - "does not write packet+0x78"
    - "does not change packet allocation, queueing, input, or output behavior"
    - "does not force EAPOL TX, key install, RSN, DHCP, link, or data success"
    - "does not add retry, replay, delay, poll loop, packet synthesis, or deauth masking"
    - "does not call any of the six peer methods from any local code path"
    - "does not declare IO80211Peer with any base class or data layout"
    - "does not include kernel-internal types like peerState or peerMonitoringCtx"

