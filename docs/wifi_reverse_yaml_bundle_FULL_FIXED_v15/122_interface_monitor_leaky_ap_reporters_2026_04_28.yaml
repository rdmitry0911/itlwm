local_before_cr_182:
  files:
    - "include/Airport/IO80211InterfaceMonitor.h"
  mismatch: "CR-180 declared 19 InterfaceMonitor helpers (controller, counters, RSSI/SNR/NF, link/channel); leaky-AP, reporter init/teardown, and per-packet record helpers were missing"
  consequence: "any future caller wanting to query the leaky-AP cache, init/destroy reporters, push per-packet RSSI, or record per-AC input/output packets would need per-callsite extern declarations with mangled signatures"

local_fix_cr_182:
  supersedes: "CR-181"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211InterfaceMonitor.h"
  changes:
    - "extend `class IO80211InterfaceMonitor` with ten non-virtual public method declarations"
    - "declare three leaky-AP helpers: `getLeakyApSsid`, `getLeakyApBssid`, `resetLeakyApStats`"
    - "declare four per-packet helpers: `setInputPacketRSSI`, `recordInputPacket`, `recordOutputPacket`, `initFrameStats`"
    - "declare three reporter lifecycle helpers: `initHeFrameStats`, `destroyReporters`, `updateAllReports`"
    - "anchor each declaration to its BootKC address in the header preamble"
    - "add forward declarations for `apple80211_ssid`, `ether_addr`, and `enum apple80211_wme_ac : unsigned int`"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    sha256_post: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    uuid_pre: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    uuid_post: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    regdiag_sha256: "6915020cdd70a07c4b77b2946dd5605bc378fc0677119506ae691a7968f01fad"
    note: "no live code references the new declarations yet, so generated binary is bit-identical to CR-181"
  non_claims:
    - "does not synthesize AppleBCMWLANPCIeSkywalkPacket"
    - "does not write packet+0x78"
    - "does not change packet allocation, queueing, input, or output behavior"
    - "does not force EAPOL TX, key install, RSN, DHCP, link, or data success"
    - "does not add retry, replay, delay, poll loop, packet synthesis, or deauth masking"
    - "does not call any of the ten new InterfaceMonitor methods from any local code path"
    - "does not declare IO80211InterfaceMonitor with any base class or data layout beyond what was already in the local header"
    - "does not include kernel-internal types whose definitions are not yet recovered"

