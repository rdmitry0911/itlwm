behavioral_notes:
  bg_scan_lifecycle: >-
    Background scan lifecycle: IDLE -> FWLOADED (firmware loaded) ->
    CONFIG_IN_PROGRESS -> CONFIGURED. From CONFIGURED, the FSM can
    enter suspend/resume sub-cycles for power management.
  suspend_resume_cycle: >-
    CONFIGURED or RESUME -> SUSPEND_IN_PROGRESS (suspendBGScan) ->
    SUSPEND. CONFIGURED or SUSPEND -> RESUME_IN_PROGRESS (resumeBGScan)
    -> RESUME. RESUME is functionally equivalent to CONFIGURED for
    further suspend/resume cycling.
  async_completion_pattern: >-
    Async operations (CONFIG, SUSPEND, RESUME) use the *_IN_PROGRESS
    intermediate states. Completion is signaled by *_DONE or *_FAILED
    events, both handled by checkPendingWork which evaluates whether
    additional work is queued.
  driver_reset_universal: >-
    DRIVER_RESET from any state returns to IDLE via cleanup. This is
    the only transition that uses the cleanup action, providing a
    guaranteed recovery path.
  ignore_strategy: >-
    Unlike other FSMs that use unhandledEvent for impossible
    transitions, BGCOMMON_FSM uses ignore (action 1) for all
    inapplicable event/state combinations. unhandledEvent (action 0)
    exists but is never referenced in the transition matrix.
  config_reentrant: >-
    CONFIG event is accepted from multiple states (IDLE, FWLOADED,
    CONFIGURED, SUSPEND, RESUME) allowing reconfiguration without
    first unconfiguring. Each transitions to CONFIG_IN_PROGRESS.
