      address: "0xffffff80022bd312"

# ═══════════════════════════════════════════════════════════════
# 3. IO80211SkywalkInterface::postMessageInternal — GLUE DISPATCH
# ═══════════════════════════════════════════════════════════════

postMessageInternal:
  title: "IO80211SkywalkInterface::postMessageInternal — Glue-based event delivery"

  postMessage:
    symbol: "IO80211SkywalkInterface::postMessage(unsigned int, void*, unsigned long, bool)"
    address: "0xffffff80022772a8"
    decompile: |
      void postMessage(UInt32 msg, void* data, unsigned long len, bool async) {
          postMessageInternal(msg, data, len, async);  // direct tail call
      }

  postMessageInternal:
    symbol: "IO80211SkywalkInterface::postMessageInternal(unsigned int, void*, unsigned long, bool)"
    address: "0xffffff80022772b2"
    decompile: |
      IOReturn postMessageInternal(UInt32 msg, void* data, unsigned long len, bool async) {
          void* glue = *(void**)(*(void**)(this + 0x120) + 0xd8);
          if (glue != NULL && async == true) {
              // Async path: queue event in IO80211Glue for delivery to userspace
              return IO80211Glue::enqueueEvent(glue, msg, data, len);
              // FUN_ffffff8002117e80 — sets pending flag, signals work source
          }
          // Sync path: falls through to postMessageSync — effectively a no-op for event delivery
          postMessageSync(msg, data, len);
          return 0;
      }
    critical_check: >-
      *(*(this+0x120) + 0xd8) is the IO80211Glue object.
      If NULL, ALL async events (SCAN_DONE, ASSOC_DONE, etc.) are silently dropped.
      The sync fallback (postMessageSync) does NOT deliver events to userspace.
    notes: >-
      in_R8B is the bool (5th param) passed via register R8 in x86_64 ABI.
      When called from PostOffice::sendMail with async=true, this takes the Glue path.

  postMessageSync:
    symbol: "IO80211SkywalkInterface::postMessageSync(unsigned int, void*, unsigned long)"
    address: "0xffffff800227776e"
    decompile: |
      IOReturn postMessageSync() {
          if (this->vtable[0xde0/8]()) {  // some check, possibly isOnWorkQueue
              getBSDName();  // log or assertion
          }
          return 0;
      }
    notes: >-
      This is NOT a delivery mechanism — it's a diagnostic/logging path.
      Events that fall through here are lost and never reach airportd.

  reportDataPathEventsGated:
    symbol: "IO80211SkywalkInterface (internal gated wrapper)"
    address: "0xffffff80022779cc"
    decompile: |
      IOReturn reportDataPathEventsGated(IO80211SkywalkInterface* iface,
                                          UInt32* msgPtr, void* data,
                                          unsigned long* lenPtr, byte* asyncPtr) {
          assert(msgPtr != NULL);
          unsigned long len = lenPtr ? *lenPtr : 0;
          bool async = asyncPtr ? (*asyncPtr & 1) : false;
          if (iface != NULL) {
              // Check PeerManager filter first
              IO80211PeerManager* pm = *(IO80211PeerManager**)(*(this+0x120) + 0x28);
              if (pm != NULL && pm->filterEvent(pm, *msgPtr, data, len) == false) {
                  return 0;  // event filtered out
              }
              postMessageInternal(iface, *msgPtr, data, len, async);
          }
          return 0;
      }
    notes: >-
      Alternative path via reportDataPathEvents (FUN_ffffff8002277a7a) which
      runs through the command gate. Also ends up at postMessageInternal.

# ═══════════════════════════════════════════════════════════════
# 4. IO80211Glue — USERSPACE EVENT DELIVERY
# ═══════════════════════════════════════════════════════════════

io80211glue:
  title: "IO80211Glue — event filter and userspace delivery"

  class_info:
    metaclass_size: "0x20"
    metaclass_name: "IO80211Glue"
    location_in_interface: "IO80211SkywalkInterface expansionData + 0xd8"

  creation:
    withOptions:
      symbol: "IO80211Glue::withOptions(IO80211SkywalkInterface*)"
      address: "0xffffff8002116dba"
      notes: "Factory method — creates and initializes Glue for the given interface."
    initWithOptions:
      symbol: "IO80211Glue::initWithOptions(IO80211SkywalkInterface*)"
      address: "0xffffff8002116e28"

  lifecycle:
    creation_point: >-
      Created during IO80211SkywalkInterface::start() lifecycle.
      Stored at interface expansionData+0xd8.
    teardown: >-
      IO80211SkywalkInterface::stop() checks if (*(expansionData + 0xd8) != 0)
      and calls IO80211Glue::stop(). See doc 89, section 6.
    stop:
      symbol: "IO80211Glue::stop()"
      address: "0xffffff8002117696"

  event_processing:
    enqueueEvent:
      symbol: "IO80211Glue (enqueue via postMessageInternal)"
      address: "0xffffff8002117e80"
      decompile: |
        IOReturn enqueueEvent(void* glueIvars) {
            FUN_ffffff8002117d62();  // allocate postMessageQueueEntry
            void* queue = *(void**)(glueIvars + 0x18);
            if ((*(byte*)(queue + 0x30) & 1) == 0) {
                *(byte*)(queue + 0x30) = 1;  // mark pending
                void* workSource = *(void**)(queue + 0x60);
                signalWorkSource(1, *(void**)(workSource + 0x48) + 0x10);
                wakeWorkQueue(workSource);
            }
            return 0;
        }

    processPendingEventQueue:
      symbol: "IO80211Glue::processPendingEventQueue()"
      address: "0xffffff8002117cce"
      notes: >-
        Dequeues pending events from linked list at glueIvars+0x18+0x20.
        Calls sendEventAndFilter for each entry.
        Clears pending flag when queue is empty.

    sendEventAndFilter:
      symbol: "IO80211Glue::sendEventAndFilter(postMessageQueueEntry*)"
      address: "0xffffff8002117a36"
      notes: >-
        Final delivery step — applies event filter and delivers to userspace
        via IOUserClient notification port. This is how airportd receives
        SCAN_DONE, ASSOC_DONE, LINK_CHANGED, etc.

# ═══════════════════════════════════════════════════════════════
# 5. IO80211SkywalkInterface EXPANSION DATA LAYOUT
# ═══════════════════════════════════════════════════════════════

skywalk_interface_expansion:
  title: "IO80211SkywalkInterface expansionData field map"
  base_offset: "this + 0x120 → pointer to expansionData struct"
  notes: >-
    The expansionData is allocated during initIvars() and zeroed via
    FUN_ffffff800221379e. It stores all internal IO80211 framework objects
    associated with the interface.

  fields:
    - offset: "0x28"
      type: "IO80211PeerManager*"
      accessor: "getPeerManager() @ 0xffffff8002274c7c"
      notes: "Used by reportDataPathEventsGated for event filtering."

    - offset: "0x30"
      type: "unknown (NOT ControllerMonitor)"
      notes: >-
        getControllerMonitor() uses controller expansion+0x30,
        NOT interface expansion+0x30. This is a different field.

    - offset: "0x58"
      type: "uint32_t interfaceRole"
      accessor: "getInterfaceRole() @ 0xffffff8002274bac"

    - offset: "0x5c"
      type: "uint32_t interfaceId"
      accessor: "getInterfaceId() @ 0xffffff8002274c8e"

    - offset: "0xa8"
      type: "event pipe related object"
      notes: >-
        Used by postMessageIOUC (0xffffff8002275376) and
        createEventPipe (0xffffff800227589e).
        postMessageIOUC calls vtable[0x130/8] on this object to check count,
        then vtable[0x1e8/8] for delivery.

    - offset: "0xb8"
      type: "role string object*"
      accessor: "getInterfaceRoleStr() @ 0xffffff8002274bbc"
      notes: "Calls vtable[0x148/8] on the object to get the string."

    - offset: "0xd8"
      type: "IO80211Glue*"
      accessor: "(no public accessor — read directly in postMessageInternal)"
      notes: >-
        THE critical field for event delivery. If NULL, all async events
        (SCAN_DONE, ASSOC_DONE, etc.) are silently dropped.
        Created during start(), destroyed during stop().

    - offset: "0xe0"
      type: "uint32_t powerState"
      notes: "0=sleep, 2=awake. Documented in doc 89, section 3."

# ═══════════════════════════════════════════════════════════════
# 6. IO80211Controller EXPANSION DATA — RELEVANT OFFSETS
# ═══════════════════════════════════════════════════════════════

controller_expansion:
  title: "IO80211Controller expansionData — PostOffice and ControllerMonitor"
  base_offset: "this + 0x120 → pointer to expansionData struct"

  fields:
    - offset: "0x30"
      type: "IO80211ControllerMonitor*"
      accessor: "getControllerMonitor() @ 0xffffff8002219f1e"

    - offset: "0xb10"
      type: "IO80211PostOffice*"
