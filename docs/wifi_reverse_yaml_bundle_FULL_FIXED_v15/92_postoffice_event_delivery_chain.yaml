        Called by IO80211Controller::postMessageSync.

    deliverMessage:
      symbol: "IO80211PostOffice::deliverMessage(IO80211SkywalkInterface*, unsigned int, void*, unsigned long, bool)"
      address: "0xffffff80022bd4ec"
      notes: "Final delivery step — calls interface postMessageInternal."

    outForDelivery:
      symbol: "IO80211PostOffice::outForDelivery()"
      address: "0xffffff80022bd50c"

    outForDeliveryTimer:
