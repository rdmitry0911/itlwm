version: 1
topic: "IO80211 PostOffice event delivery chain — postMessage dispatch, IO80211Glue, scan pipeline"
status: verified_from_disassembly
purpose: >-
  Documents the complete event delivery chain from IO80211Controller::postMessage
  through IO80211PostOffice to IO80211Glue and into userspace (airportd).
  Includes SkywalkInterface expansion data layout, AppleBCMWLAN scanComplete
  reference implementation, and the OpenBSD ieee80211_match_bss AUTO_JOIN fix.
  All data extracted from BootKernelExtensions.kc (macOS 26.3, 25D125, x86_64)
  via direct disassembly and Ghidra decompilation.

source:
  kernel: "macOS 26.3 (25D125), x86_64"
  binary: "BootKernelExtensions.kc"
  decompilation: "ghidra_output/ — IO80211Family_decompiled.c, AppleBCMWLAN_Core_decompiled.c"
  disassembly: "manual x86_64 decode of postMessage/postMessageSync at 0xffffff8002219ffe/0xffffff800221a01e"

# ═══════════════════════════════════════════════════════════════
# 1. IO80211Controller::postMessage — DISPATCH CHAIN
# ═══════════════════════════════════════════════════════════════

postMessage_dispatch:
  title: "IO80211Controller::postMessage dispatch through PostOffice"

  controller_postMessage:
    symbol: "IO80211Controller::postMessage(IO80211SkywalkInterface*, unsigned int, void*, unsigned long, bool)"
    address: "0xffffff8002219ffe"
    size: "0x20 bytes (thin trampoline)"
    disassembly: |
      push rbp
      mov rbp, rsp
      mov rax, [rdi+0x120]       ; rax = controller->expansionData
      mov rdi, [rax+0xb10]       ; rdi = PostOffice object (expansion+0xb10)
      mov rax, [rdi]             ; rax = PostOffice vtable
      mov rax, [rax+0x120]       ; rax = vtable slot 36 = PostOffice::sendMail
      pop rbp
      jmp rax                    ; tail call — preserves rsi(iface), edx(msg), rcx(data), r8(len), r9/stack(async)
    raw_bytes: "55 48 89 e5 48 8b 87 20 01 00 00 48 8b b8 10 0b 00 00 48 8b 07 48 8b 80 20 01 00 00 5d ff e0"
    notes: >-
      This is a THIN TRAMPOLINE — does no validation, just dispatches.
      rdi on entry = IO80211Controller (this).
      After the trampoline, rdi = PostOffice, rsi = IO80211SkywalkInterface.
      If PostOffice (expansion+0xb10) is NULL, this will crash with NULL deref.

  controller_postMessageSync:
    symbol: "IO80211Controller::postMessageSync(IO80211SkywalkInterface*, unsigned int, void*, unsigned long, bool)"
    address: "0xffffff800221a01e"
    size: "0x20 bytes (thin trampoline)"
    disassembly: |
      push rbp
      mov rbp, rsp
      mov rax, [rdi+0x120]       ; rax = controller->expansionData
      mov rdi, [rax+0xb10]       ; rdi = PostOffice object
      mov rax, [rdi]             ; rax = PostOffice vtable
      mov rax, [rax+0x128]       ; rax = vtable slot 37 = PostOffice::sendMailSync
      pop rbp
      jmp rax                    ; tail call
    raw_bytes: "55 48 89 e5 48 8b 87 20 01 00 00 48 8b b8 10 0b 00 00 48 8b 07 48 8b 80 28 01 00 00 5d ff e0"
    notes: >-
      Same pattern as postMessage but dispatches to vtable slot 37 (sendMailSync)
      instead of slot 36 (sendMail).

  getPostOffice:
    symbol: "IO80211Controller::getPostOffice()"
    address: "0xffffff800221a212"
    decompile: "return *(long*)(*(long*)(this + 0x120) + 0xb10);"
    notes: "Confirms PostOffice is at controller expansionData+0xb10."

  getControllerMonitor:
    symbol: "IO80211Controller::getControllerMonitor()"
    address: "0xffffff8002219f1e"
    decompile: "return *(long*)(*(long*)(this + 0x120) + 0x30);"
    notes: >-
      ControllerMonitor is at expansion+0x30, NOT 0xb10.
      These are different objects — PostOffice handles event delivery,
      ControllerMonitor handles statistics/reporting.

# ═══════════════════════════════════════════════════════════════
# 2. IO80211PostOffice — MESSAGE QUEUE AND DELIVERY
# ═══════════════════════════════════════════════════════════════

postoffice:
  title: "IO80211PostOffice — event queueing and delivery"

  class_info:
    metaclass_size: "0x18"
    metaclass_address: "0xffffff8002408770"

  creation:
    function: "IO80211Controller::CreatePostOffice()"
    address: "0xffffff800221a1fc"
    decompile: |
      void CreatePostOffice() {
          IO80211WorkQueue* wq = this->getWorkQueue();  // vtable[0xc68/8]
          IO80211PostOffice::allocWithParams(wq);
      }
    notes: >-
      Called during IO80211Controller::start().
      PostOffice is backed by the controller's IO80211WorkQueue.

  allocWithParams:
    symbol: "IO80211PostOffice::allocWithParams(IO80211WorkQueue*)"
    address: "0xffffff80022bd22a"

  initWithParams:
    symbol: "IO80211PostOffice::initWithParams(IO80211WorkQueue*)"
    address: "0xffffff80022bd29c"

  methods:
    sendMail:
      symbol: "IO80211PostOffice::sendMail(IO80211SkywalkInterface*, unsigned int, void*, unsigned long, bool)"
      address: "0xffffff80022bd386"
      vtable_offset: "0x120 (slot 36)"
      notes: >-
        Async path — enqueues the message for later delivery via outForDelivery timer.
        Called by IO80211Controller::postMessage when bool=true (most common case).

    sendMailSync:
      symbol: "IO80211PostOffice::sendMailSync(IO80211SkywalkInterface*, unsigned int, void*, unsigned long, bool)"
      address: "0xffffff80022bd320"
      vtable_offset: "0x128 (slot 37)"
      decompile: |
