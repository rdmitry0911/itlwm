# ═══════════════════════════════════════════════════════════════
# 7. AppleBCMWLAN scanComplete — REFERENCE IMPLEMENTATION
# ═══════════════════════════════════════════════════════════════

bcm_scan_complete:
  title: "AppleBCMWLANCore::scanComplete — reference for SCAN_DONE delivery"

  function:
    symbol: "AppleBCMWLANCore::scanComplete(int)"
    address: "0xffffff80015b50f2"
    source_path: >-
      /AppleInternal/Library/BuildRoots/.../AppleBCMWLANV3_DriversMac/AppleBCMWLANCore.cpp

  postMessage_call:
    decompile_line: 60066
    code: |
      if (*(long *)(param_1[0x25] + 0x2c20) != 0) {
          IO80211Controller::postMessage(
              this,
              *(IO80211SkywalkInterface**)(ivars + 0x2c20),  // primary STA interface
              10,        // APPLE80211_M_SCAN_DONE
              &status,   // 4-byte scan status
              4,         // data length
              true       // async=true
          );
      }
    notes: >-
      Key observations:
      1. Interface pointer stored at ivars+0x2c20 (BCM-specific layout).
      2. NULL-checked before calling postMessage.
      3. SCAN_DONE = 10 = 0x0A, data = &status (4 bytes), async = true.
      4. This is EXACTLY the same call signature used in itlwm's fakeScanDone
         and eventHandler (SCAN_DONE path).
      5. BCM logs "post APPLE80211_M_SCAN_DONE with 0x%x" before calling.

  itlwm_equivalent: >-
    In itlwm AirportItlwmV2.cpp, fakeScanDone and eventHandler both call:
      this->postMessage(fNetIf, APPLE80211_M_SCAN_DONE, &msg, 4, true);
    This matches BCM's signature exactly.

# ═══════════════════════════════════════════════════════════════
# 8. COMPLETE EVENT DELIVERY CHAIN — END-TO-END
# ═══════════════════════════════════════════════════════════════

event_delivery_chain:
  title: "End-to-end event delivery: driver → airportd"

  chain: |
    1. Driver calls:
       controller->postMessage(skywalkInterface, APPLE80211_M_SCAN_DONE, &status, 4, true)

    2. IO80211Controller::postMessage (0xffffff8002219ffe) — thin trampoline:
       - Reads PostOffice from controller->expansion[0xb10]
       - Tail-calls PostOffice::sendMail (vtable slot 36)

    3. IO80211PostOffice::sendMail (0xffffff80022bd386):
       - Allocates postMessageQueueEntry
       - Enqueues onto PostOffice internal queue
       - Arms outForDeliveryTimer

    4. IO80211PostOffice::outForDelivery (0xffffff80022bd50c) — timer fires:
       - Dequeues entry
       - Calls deliverMessage

    5. IO80211PostOffice::deliverMessage (0xffffff80022bd4ec):
       - Calls IO80211SkywalkInterface::postMessageInternal

    6. IO80211SkywalkInterface::postMessageInternal (0xffffff80022772b2):
       - Reads IO80211Glue from interface->expansion[0xd8]
       - IF Glue != NULL AND async == true:
           → IO80211Glue event path (step 7)
       - ELSE:
           → postMessageSync — NO-OP for event delivery (events LOST)

    7. IO80211Glue::enqueueEvent (0xffffff8002117e80):
       - Adds event to Glue's pending queue
       - Sets pending flag at queue+0x30
       - Signals work source to wake processing

    8. IO80211Glue::processPendingEventQueue (0xffffff8002117cce):
       - Dequeues event from linked list
       - Calls sendEventAndFilter

    9. IO80211Glue::sendEventAndFilter (0xffffff8002117a36):
       - Applies event filter
       - Delivers to IOUserClient notification port
       - airportd receives the event

  failure_points:
    - point: "PostOffice NULL (controller expansion+0xb10)"
      symptom: "Kernel panic — NULL pointer dereference in postMessage trampoline"
      diagnosis: "IO80211Controller::start() failed to create PostOffice"

    - point: "IO80211Glue NULL (interface expansion+0xd8)"
      symptom: "Events silently dropped — airportd never sees SCAN_DONE, ASSOC_DONE, etc."
      diagnosis: >-
        IO80211SkywalkInterface::start() failed to create Glue, or it was
        never called. The sync fallback path is a no-op. This is the most
        likely cause of 'no networks visible' when scans complete successfully.

    - point: "Interface pointer NULL"
      symptom: "postMessageGated returns kIOReturnNotReady, events not sent"
      diagnosis: "fNetIf not yet initialized — timing issue in driver startup"

  itlwm_diagnostic:
    description: >-
      itlwm's postMessageGated logs these framework internals:
        postOffice=<ptr>  — controller expansion+0xb10 (must be non-NULL)
        ifExpansion=<ptr>  — interface expansion data (must be non-NULL)
        glue=<ptr>         — interface expansion+0xd8 (must be non-NULL for events)
      If any of these are 0x0, that identifies the exact failure point in the chain.

# ═══════════════════════════════════════════════════════════════
# 9. OpenBSD ieee80211_match_bss AUTO_JOIN FIX
# ═══════════════════════════════════════════════════════════════

match_bss_auto_join_fix:
  title: "ieee80211_match_bss — removal of counterproductive ESSID rejection"

  original_code:
    file: "itl80211/openbsd/net80211/ieee80211_node.c"
    function: "ieee80211_match_bss()"
    location: "~line 1086"
    code: |
      if (ISSET(ic->ic_flags, IEEE80211_F_AUTO_JOIN) &&
          ic->ic_des_esslen == 0)
          fail |= IEEE80211_NODE_ASSOCFAIL_ESSID;

  problem: >-
    In the OpenBSD model, this check prevents the driver from blindly joining
    a random network when no desired ESSID is configured. But in the Apple/macOS
    model, network selection is performed by airportd in userspace — it reads
    scan results via APPLE80211_IOC_SCAN_RESULT and tells the driver which BSS
    to join via APPLE80211_IOC_ASSOCIATE.

    With AUTO_JOIN flag set and des_esslen==0 (no target ESSID configured — the
    normal state before association), ALL scanned BSS nodes are rejected with
    fail=0x14 (ESSID|PRIVACY). This creates an infinite SCAN→SCAN loop:
      1. ieee80211_end_scan → ieee80211_node_choose_bss
      2. All 48 nodes rejected (fail=0x14)
      3. ic_state stays in SCAN
      4. Workloop starved — fakeScanDone timer delayed by 57 seconds
      5. airportd never receives SCAN_DONE, never sees networks

  fix: >-
    Removed the AUTO_JOIN+des_esslen==0 check entirely. The remaining ESSID check
    (des_esslen != 0 && essid mismatch) still correctly filters when airportd has
    explicitly set a target ESSID via ASSOCIATE. The PRIVACY check below still
    prevents association with encrypted networks when no credentials are configured.

  rejection_flags:
    - { flag: "IEEE80211_NODE_ASSOCFAIL_CHAN",       value: "0x01" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_IBSS",       value: "0x02" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_PRIVACY",    value: "0x04" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_BASIC_RATE", value: "0x08" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_ESSID",      value: "0x10" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_BSSID",      value: "0x20" }
    - { flag: "IEEE80211_NODE_ASSOCFAIL_WPA_PROTO",  value: "0x40" }

  common_failure_bitmask: >-
    fail=0x14 = ESSID(0x10) | PRIVACY(0x04): the ESSID flag came from the removed
    AUTO_JOIN check; the PRIVACY flag came from mismatch between ic_flags and
    ni_capinfo (driver has no security configured, APs have WPA2).
    After removing the ESSID check, PRIVACY alone (0x04) still prevents
    auto-association with encrypted APs — the correct safety net.
