local_before_cr_183:
  files:
    - "include/Airport/IO80211Peer.h"
  mismatch: "CR-177 declared six Peer helpers (withAddressAndManager, init, getMacAddress, setMacAddress, getManager, getGeneration). Capability flags, credit accounting, TX/RX sequence counters, and cache/SoftAP peer flags were missing"
  consequence: "any future caller wanting to read Peer HT/VHT/HE/6E capability flags, query TX credits, walk RX/TX sequence numbers, or check Cached-in-FW / SoftAP peer state would need per-callsite extern declarations with mangled signatures"

local_fix_cr_183:
  supersedes: "CR-182"
  type: "REFERENCE_ALIGNMENT_FIX"
  files:
    - "include/Airport/IO80211Peer.h"
  changes:
    - "extend `class IO80211Peer` with twenty-five non-virtual public method declarations"
    - "declare nine capability getters/setters (HT/VHT/HE/6E/hasHTorVHT)"
    - "declare two transmit predicates (canTransmit, canTransmitReason)"
    - "declare four credit/counter accessors (getOpenCredits, getCloseCredits, getNumTxPacket, getOutputSuccess)"
    - "declare four TX-quantum/sequence helpers (getTxQuantum, setTxQuantum, getNextTxSeq, setTransmitOk)"
    - "declare two RX-sequence helpers (getRxSequence, getRxSequenceMulticast)"
    - "declare four cache/SoftAP-peer flag accessors (isCachedInFw, setCachedInFw, isSoftAPPeer, setSoftAPPeer)"
    - "anchor each declaration to its BootKC address in the header preamble"
  binary_invariance:
    sha256_pre: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    sha256_post: "c1d6e7b134c70c8db158a6d270379684d992f1e67bc51bdfa220c7437929aaf8"
    uuid_pre: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    uuid_post: "BA3D771F-F079-33FF-94E5-C792E66237D8"
    regdiag_sha256: "6915020cdd70a07c4b77b2946dd5605bc378fc0677119506ae691a7968f01fad"
    note: "no live code references the new declarations yet, so generated binary is bit-identical to CR-182"
  non_claims:
    - "does not synthesize AppleBCMWLANPCIeSkywalkPacket"
    - "does not write packet+0x78"
    - "does not change packet allocation, queueing, input, or output behavior"
    - "does not force EAPOL TX, key install, RSN, DHCP, link, or data success"
    - "does not add retry, replay, delay, poll loop, packet synthesis, or deauth masking"
    - "does not call any of the twenty-five new Peer methods from any local code path"
    - "does not declare IO80211Peer with any base class or data layout beyond what was already in the local header"
    - "does not include kernel-internal types whose definitions are not yet recovered"

