# ═══════════════════════════════════════════════════════════════
# wl_event_msg_t (BCM firmware event, cross-referenced)
# ═══════════════════════════════════════════════════════════════

wl_event_msg_t:
  notes: "Broadcom-specific, consistent across all BCM handlers"
  recovered_fields:
    - {offset: "0x00", size: 2, type: uint16, name: version}
    - {offset: "0x02", size: 2, type: uint16, name: flags}
    - {offset: "0x04", size: 4, type: uint32, name: event_type}
    - {offset: "0x08", size: 4, type: uint32, name: status}
    - {offset: "0x0C", size: 4, type: uint32, name: reason}
    - {offset: "0x10", size: 4, type: uint32, name: auth_type}
    - {offset: "0x14", size: 4, type: uint32, name: datalen}
    - {offset: "0x18", size: 6, type: "uint8[6]", name: addr}
    - {offset: "0x1E", size: 16, type: padding, name: padding}
    - {offset: "0x2E", size: 1, type: uint8, name: flags2, notes: "checked in handleLinkEvent"}
    - {offset: "0x30", size: 2, type: int16, name: additional_type, notes: "checked in SPMI handler"}
  gap: "Fields at +0x38..+0x5C used by SPMI handler need dedicated pass"

