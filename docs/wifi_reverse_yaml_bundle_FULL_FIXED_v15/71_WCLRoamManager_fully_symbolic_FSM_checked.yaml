kdk_to_kc_note: KDK-to-BootKC delta is +0x138, consistent across all 11 action handlers. Inter-function deltas verified identical in both address spaces.
behavioral_notes:
  roam_flow: 'Normal roam path: LINK_UP -> ROAM_SCAN (ROAM_START) -> ROAM_REASSOC (ROAM_PREP) -> WAIT_ROAM_DONE (REASSOC) -> LINK_UP (ROAM_DONE). This models the full roam lifecycle: scan candidates, prepare reassoc, wait for completion, return to connected.'
  scan_phase: ROAM_SCAN accepts ROAM_START re-entry (restart scan), ROAM_SCAN_END (intermediate results), ROAM_PREP (advance to reassoc), and ROAM_DONE (abort early if roam completes during scan). TIMEOUT in ROAM_SCAN returns to LINK_UP via ignore (abort roam silently).
  reassoc_phase: ROAM_REASSOC accepts ROAM_SCAN_END (late scan results), ROAM_PREP (stay in state), REASSOC (advance to WAIT_ROAM_DONE), ROAM_DONE (complete). REASSOC event uses ignore (action 0), not the reassoc handler (action 7) - this is a state transition only.
  unused_action: Action 7 (reassoc handler) is registered in the action table but never referenced by any transition matrix cell. It may be invoked through a non-FSM code path or reserved for future use.
  unhandled_vs_ignore: ROAM_MANAGER distinguishes impossible events (unhandledEvent - logs error) from expected-but-suppressed events (ignore - silent drop). For example, LINK_DOWN + ROAM_START = unhandledEvent (should never happen), but LINK_UP + REASSOC = ignore (normal during connected state). This contrasts with SCAN/JOIN managers which use ignore for both cases.
  sleep_suppression: SLEEP state suppresses all roam events (ROAM_START through ROAM_DONE) using ignore(0) with explicit next=SLEEP transitions. Only LINK_DOWN (-> LINK_DOWN via linkDown) and WAKE (-> LINK_UP via wake) exit SLEEP.
  timeout_abort: TIMEOUT from any active roam state (ROAM_SCAN, ROAM_REASSOC, WAIT_ROAM_DONE) returns to LINK_UP via ignore. This is a clean roam abort on timeout - no cleanup handler needed.
