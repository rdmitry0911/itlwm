name: CD

on:
  push:
    branches: master
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_OUTPUT: 'build/Build/Products/Debug'

jobs:

  build:
    
    # The Tahoe release kext is x86_64.
    # Do not use macos-latest: GitHub maps it to an Arm runner.
    runs-on: macos-26-intel

    steps:

    # v6 is pinned because macOS-26 runners no longer execute Node 12/16
    # actions. The official action at this immutable SHA uses Node 24.
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Check x86_64 release runner
      run: |
        test "$(uname -m)" = x86_64

    - name: Manage Version
      run: |
        git fetch --force --prune --tags
        GIT_SHA="$(git rev-parse --short HEAD)"
        eval $(grep -m 1 "MODULE_VERSION =" itlwm.xcodeproj/project.pbxproj | tr -d ';' | tr -d '\t' | tr -d " ")
        echo "SHORT_SHA=$GIT_SHA" >> $GITHUB_ENV
        echo "ITLWM_VER=$MODULE_VERSION" >> $GITHUB_ENV

    - name: Install MacKernelSDK
      run: |
        git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git

    - name: Check Tahoe App Store controller contract
      run: |
        bash scripts/test_tahoe_appstore_iobuiltin_contract.sh

    - name: Build itlwm
      run: |
        set -o pipefail
        xcodebuild -scheme itlwm -configuration Debug -derivedDataPath build GIT_COMMIT=_${SHORT_SHA} | xcbeautify

    - name: Build AirportItlwm
      run: |
        set -o pipefail
        xcodebuild -scheme "AirportItlwm (all)" -configuration Debug -derivedDataPath build GIT_COMMIT=_${SHORT_SHA} | xcbeautify

    # Tahoe is intentionally outside the legacy "AirportItlwm (all)" scheme.
    # Use the project-owned build wrapper: it aligns MacKernelSDK's Tahoe ABI
    # declarations before building the dedicated target and stages a kext, but
    # never installs, loads, signs for distribution, or reboots the runner.
    - name: Build AirportItlwm Tahoe
      run: |
        check_tahoe_plist() {
          python3 -c 'import plistlib, sys; p = plistlib.load(open(sys.argv[1], "rb")); assert p["IOKitPersonalities"]["NetworkController"]["IOBuiltin"] is False' "$1"
        }
        ITLWM_SOURCE_ID_OVERRIDE="${SHORT_SHA}" ./scripts/build_tahoe.sh
        TAHOE_KEXT='Build/Debug/Tahoe/AirportItlwm.kext'
        test -f "$TAHOE_KEXT/Contents/Info.plist"
        test -f "$TAHOE_KEXT/Contents/MacOS/AirportItlwm"
        check_tahoe_plist "$TAHOE_KEXT/Contents/Info.plist"
        lipo -archs "$TAHOE_KEXT/Contents/MacOS/AirportItlwm" | grep -qx 'x86_64'

    - name: Pack Artifacts
      run: |
        check_tahoe_plist() {
          python3 -c 'import plistlib, sys; p = plistlib.load(open(sys.argv[1], "rb")); assert p["IOKitPersonalities"]["NetworkController"]["IOBuiltin"] is False' "$1"
        }
        TAHOE_KEXT='Build/Debug/Tahoe/AirportItlwm.kext'
        TAHOE_ZIP="$BUILD_OUTPUT/AirportItlwm-Tahoe-v${ITLWM_VER}-DEBUG-alpha-${SHORT_SHA}.zip"
        test -d "$TAHOE_KEXT"
        ditto -c -k --sequesterRsrc --keepParent "$TAHOE_KEXT" "$TAHOE_ZIP"
        unzip -Z1 "$TAHOE_ZIP" | grep -qx 'AirportItlwm.kext/Contents/Info.plist'
        VERIFY_DIR="$(mktemp -d)"
        trap 'rm -rf "$VERIFY_DIR"' EXIT
        ditto -x -k "$TAHOE_ZIP" "$VERIFY_DIR"
        test -f "$VERIFY_DIR/AirportItlwm.kext/Contents/MacOS/AirportItlwm"
        check_tahoe_plist "$VERIFY_DIR/AirportItlwm.kext/Contents/Info.plist"
        cd $BUILD_OUTPUT
          zip -r itlwm-v${ITLWM_VER}-DEBUG-alpha-${SHORT_SHA}.zip itlwm.kext
          while read -r tgt ; do
            zip -r AirportItlwm-${tgt// /_}-v${ITLWM_VER}-DEBUG-alpha-${SHORT_SHA}.zip "$tgt"
          done < <(find . -mindepth 1 -maxdepth 1 -type d -not -path "*.kext" | cut -c 3-)
        cd -

    - name: Generate Prerelease Release Notes
      run: |
        echo '### Disclaimer:' >> ReleaseNotes.md
        echo '***This alpha version is for testing only.***' >> ReleaseNotes.md
        echo 'It is not ready for daily use and we do not guarantee its usability.' >> ReleaseNotes.md
        echo 'If you discovered an issue and you do not have debugging skills, please check with the [Gitter Chat Room](https://gitter.im/OpenIntelWireless/itlwm) in advance before opening an Issue.' >> ReleaseNotes.md
        echo '### The latest five updates are:' >> ReleaseNotes.md
        git log -"5" --format="- %H %s" | sed '/^$/d' >> ReleaseNotes.md

    # A per-commit tag makes every release immutable and avoids deleting an
    # unrelated prerelease. `gh` is part of the GitHub-hosted macOS image, so
    # this does not depend on an obsolete Node 16 third-party action.
    - name: Publish immutable prerelease
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        TAG="v${ITLWM_VER}-alpha-${SHORT_SHA}"
        TAHOE_ZIP="$BUILD_OUTPUT/AirportItlwm-Tahoe-v${ITLWM_VER}-DEBUG-alpha-${SHORT_SHA}.zip"
        test -f "$TAHOE_ZIP"
        shopt -s nullglob
        assets=("$BUILD_OUTPUT"/*.zip)
        test "${#assets[@]}" -gt 0
        gh release create "$TAG" "${assets[@]}" \
          --target "$GITHUB_SHA" --prerelease --title "$TAG" \
          --notes-file ReleaseNotes.md
        gh release view "$TAG" --json targetCommitish,assets > release.json
        python3 - "$GITHUB_SHA" "$TAHOE_ZIP" release.json <<'PY'
        import json
        import pathlib
        import sys

        release = json.load(open(sys.argv[3]))
        assert release["targetCommitish"] == sys.argv[1]
        assert pathlib.Path(sys.argv[2]).name in {
            asset["name"] for asset in release["assets"]
        }
        PY
